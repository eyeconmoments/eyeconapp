name: Build Android Widget APK

on:
  push:
    branches: [ "claude/deploy-web-app-cclTz", "main" ]
    paths:
      - "android-widget/**"
  workflow_dispatch:   # also allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Accept Android SDK licences
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build debug APK
        working-directory: android-widget
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: eyecon-widget-debug
          path: android-widget/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
