                    <div className="shrink-0">
                      {f.acknowledgedAt ? (
                        <span className="text-xs px-2 py-1 rounded-full bg-green-100 text-green-700 font-medium">
                          ✅ Seen {new Date(f.acknowledgedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'})}
                        </span>
                      ) : (
                        <span className={`text-xs px-2 py-1 rounded-full font-medium ${darkMode ? 'bg-amber-800 text-amber-300' : 'bg-amber-100 text-amber-700'}`}>
                          ⏳ Pending
                        </span>
                      )}
                    </div>
                  </div>
                  {!isAdminView && !f.acknowledgedAt && (
                    <button onClick={() => acknowledgeFeedback(f.id)}
                      className="mt-3 w-full py-2 rounded-lg bg-green-500 text-white text-sm font-semibold hover:bg-green-600">
                      ✅ Acknowledge
                    </button>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  // REVISIONS
  if (currentView === 'revisions') {
    const selectedRev = revisions.find(r => r.id === selectedRevisionId) || null;

    const addRevision = async () => {
      if (!revisionNewTitle.trim()) return;
      const rev = { id: Date.now(), title: revisionNewTitle.trim(), date: new Date().toISOString().split('T')[0], items: [], completed: false, completedAt: null, completedBy: null, extensions: 0 };
      const { error } = await db.from('revisions').insert([{ id: rev.id, title: rev.title, date: rev.date, items: [], completed: false, completed_at: null, completed_by: null, extensions: 0 }]);
      if (error) { alert('Error saving revision: ' + error.message); return; }
      setRevisions(prev => [rev, ...prev]);
      setRevisionNewTitle('');
      setSelectedRevisionId(rev.id);
    };

    const deleteRevision = async (id) => {
      if (!confirm('Delete this revision log?')) return;
      await db.from('revisions').delete().eq('id', id);
      setRevisions(prev => prev.filter(r => r.id !== id));
      if (selectedRevisionId === id) setSelectedRevisionId(null);
    };

    const pasteItems = async (revId) => {
      if (!revisionPasteText.trim()) return;
      const lines = revisionPasteText.split('\n').map(l => l.trim()).filter(Boolean);
      const newItems = lines.map(line => ({ id: Date.now() + Math.random(), text: line, status: null, notes: '', loggedBy: null, loggedLocation: '' }));
      const rev = revisions.find(r => r.id === revId);
      const updatedItems = [...(rev?.items || []), ...newItems];
      setRevisions(prev => prev.map(r => r.id === revId ? { ...r, items: updatedItems } : r));
      await db.from('revisions').update({ items: updatedItems }).eq('id', revId);
      setRevisionPasteText('');
    };

    const addSingleItem = async (revId, text) => {
      if (!text.trim()) return;
      const item = { id: Date.now() + Math.random(), text: text.trim(), status: null, notes: '', loggedBy: null, loggedLocation: '' };
      const rev = revisions.find(r => r.id === revId);
      const updatedItems = [...(rev?.items || []), item];
      setRevisions(prev => prev.map(r => r.id === revId ? { ...r, items: updatedItems } : r));
      await db.from('revisions').update({ items: updatedItems }).eq('id', revId);
    };

    const updateItemStatus = async (revId, itemId, status) => {
      const rev = revisions.find(r => r.id === revId);
      const updatedItems = (rev?.items || []).map(it => it.id === itemId ? { ...it, status } : it);
      setRevisions(prev => prev.map(r => r.id === revId ? { ...r, items: updatedItems } : r));
      await db.from('revisions').update({ items: updatedItems }).eq('id', revId);
    };

    const saveItemNote = async (revId, itemId, notes) => {
      const rev = revisions.find(r => r.id === revId);
      const updatedItems = (rev?.items || []).map(it => it.id === itemId ? { ...it, notes } : it);
      setRevisions(prev => prev.map(r => r.id === revId ? { ...r, items: updatedItems } : r));
      await db.from('revisions').update({ items: updatedItems }).eq('id', revId);
      setRevisionNoteTarget(null);
    };

    const logItemCompletion = async (revId, itemId, location) => {
      const rev = revisions.find(r => r.id === revId);
      const updatedItems = (rev?.items || []).map(it => it.id === itemId ? {
        ...it, status: 'green', loggedBy: currentUser?.name || 'Unknown',
        loggedAt: new Date().toISOString(), loggedLocation: location
      } : it);
      setRevisions(prev => prev.map(r => r.id === revId ? { ...r, items: updatedItems } : r));
      await db.from('revisions').update({ items: updatedItems }).eq('id', revId);
      setRevisionNoteTarget(null);
    };

    const deleteItem = async (revId, itemId) => {
      const rev = revisions.find(r => r.id === revId);
      const updatedItems = (rev?.items || []).filter(it => it.id !== itemId);
      setRevisions(prev => prev.map(r => r.id === revId ? { ...r, items: updatedItems } : r));
      await db.from('revisions').update({ items: updatedItems }).eq('id', revId);
    };

    const markRevisionComplete = async (revId) => {
      const rev = revisions.find(r => r.id === revId);
      const newCompleted = !rev.completed;
      const completedAt = newCompleted ? new Date().toISOString() : null;
      const completedBy = newCompleted ? (currentUser?.name || 'Unknown') : null;
      setRevisions(prev => prev.map(r => r.id === revId ? { ...r, completed: newCompleted, completedAt, completedBy } : r));
      await db.from('revisions').update({ completed: newCompleted, completed_at: completedAt, completed_by: completedBy }).eq('id', revId);
    };

    const extendRevision = async (revId) => {
      const rev = revisions.find(r => r.id === revId);
      const newExtensions = (rev.extensions || 0) + 1;
      setRevisions(prev => prev.map(r => r.id === revId ? { ...r, extensions: newExtensions } : r));
      await db.from('revisions').update({ extensions: newExtensions }).eq('id', revId);
    };

    const scanRevisionScreenshot = async (revId, file) => {
      if (!file) return;
      let key = helpApiKey;
      if (!key) {
        key = window.prompt('Enter your Anthropic API key to use AI scanning:');
        if (!key) return;
        setHelpApiKey(key);
        localStorage.setItem('eyecon_ai_key', key);
      }
      setRevisionScanLoading(true);
      setRevisionScanPreview(null);
      try {
        const compressed = await compressImageForAI(await new Promise(res => {
          const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(file);
        }));
        const base64 = compressed.split(',')[1];
        const mediaType = compressed.startsWith('data:image/png') ? 'image/png' : 'image/jpeg';
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true' },
          body: JSON.stringify({
            model: 'claude-opus-4-5',
            max_tokens: 1024,
            messages: [{
              role: 'user',
              content: [
                { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
                { type: 'text', text: 'This is a screenshot of Instagram or WhatsApp messages containing video/photo editing revision requests from a client. Extract every distinct change request, correction, or revision they are asking for. Output ONLY a plain numbered list, one revision per line, no extra commentary. Be specific and keep each item concise. Example output:\n1. Make the intro shorter\n2. Change background music\n3. Remove the clip at 2:30\nNow extract the revisions:' }
              ]
            }]
          })
        });
        if (!res.ok) { const e = await res.json().catch(()=>{}); throw new Error(e?.error?.message || `HTTP ${res.status}`); }
        const data = await res.json();
        const text = data.content?.[0]?.text || '';
        const items = text.split('\n').map(l => l.replace(/^\d+[\.\)]\s*/, '').trim()).filter(Boolean);
        if (items.length === 0) throw new Error('No revision items found in the image.');
        setRevisionScanPreview({ revId, items });
      } catch(e) {
        alert('Scan failed: ' + e.message);
      }
      setRevisionScanLoading(false);
    };

    const confirmScanPreview = async () => {
      if (!revisionScanPreview) return;
      const newItems = revisionScanPreview.items.map(text => ({ id: Date.now() + Math.random(), text, status: null, notes: '', loggedBy: null, loggedLocation: '' }));
      const rev = revisions.find(r => r.id === revisionScanPreview.revId);
      const updatedItems = [...(rev?.items || []), ...newItems];
      setRevisions(prev => prev.map(r => r.id === revisionScanPreview.revId ? { ...r, items: updatedItems } : r));
      await db.from('revisions').update({ items: updatedItems }).eq('id', revisionScanPreview.revId);
      setRevisionScanPreview(null);
    };

    const downloadRevisionPDF = (rev) => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });
      const W = 210; const margin = 15; let y = 20;
      const lh = 7;
      const wrap = (text, x, maxW) => {
        const words = String(text).split(' '); let line = ''; const lines = [];
        words.forEach(w => { const test = line ? line + ' ' + w : w; if (doc.getTextWidth(test) > maxW) { lines.push(line); line = w; } else line = test; });
        if (line) lines.push(line);
        return lines;
      };
      // Header
      doc.setFillColor(26, 37, 53); doc.rect(0, 0, W, 28, 'F');
      doc.setTextColor(193, 167, 106); doc.setFontSize(16); doc.setFont('helvetica', 'bold');
      doc.text('EYECON MOMENTS', margin, 12);
      doc.setFontSize(9); doc.setFont('helvetica', 'normal'); doc.setTextColor(180, 180, 180);
      doc.text('REVISION REPORT', margin, 18);
      doc.setTextColor(255,255,255); doc.setFontSize(11); doc.setFont('helvetica', 'bold');
      doc.text(rev.title, margin, 25);
      y = 36;
      // Meta
      doc.setTextColor(80,80,80); doc.setFontSize(9); doc.setFont('helvetica', 'normal');
      doc.text(`Date: ${rev.date}`, margin, y);
      doc.text(`Generated: ${new Date().toLocaleDateString('en-GB')}`, W/2, y);
      if (rev.completed) { doc.setTextColor(34,197,94); doc.text(`✓ Completed by ${rev.completedBy} on ${new Date(rev.completedAt).toLocaleDateString('en-GB')}`, margin, y+6); y += 6; }
      y += 10;
      // Summary bar
      const total = rev.items.length;
      const done = rev.items.filter(i => i.status === 'green').length;
      const amber = rev.items.filter(i => i.status === 'amber').length;
      const red = rev.items.filter(i => i.status === 'red').length;
      const unset = total - done - amber - red;
      doc.setFillColor(240,240,240); doc.roundedRect(margin, y, W-margin*2, 10, 2, 2, 'F');
      const barW = W - margin*2;
      let bx = margin;
      if (done > 0) { doc.setFillColor(34,197,94); doc.rect(bx, y, (done/total)*barW, 10, 'F'); bx += (done/total)*barW; }
      if (amber > 0) { doc.setFillColor(251,191,36); doc.rect(bx, y, (amber/total)*barW, 10, 'F'); bx += (amber/total)*barW; }
      if (red > 0) { doc.setFillColor(239,68,68); doc.rect(bx, y, (red/total)*barW, 10, 'F'); bx += (red/total)*barW; }
      doc.setTextColor(50,50,50); doc.setFontSize(8);
      doc.text(`${total} items  ✅ ${done} done  🟡 ${amber} partial  ❌ ${red} issues  ⬜ ${unset} pending`, margin + 2, y + 6.5);
      y += 16;
      // Items
      rev.items.forEach((item, idx) => {
        if (y > 270) { doc.addPage(); y = 20; }
        const statusStr = item.status === 'green' ? '✅' : item.status === 'amber' ? '🟡' : item.status === 'red' ? '❌' : '⬜';
        const bgCol = item.status === 'green' ? [240,255,244] : item.status === 'amber' ? [255,251,235] : item.status === 'red' ? [255,241,241] : [250,250,250];
        const lines = wrap(item.text, margin + 16, W - margin*2 - 20);
        const rowH = Math.max(lh, lines.length * 5.5 + (item.notes ? 5 : 0) + (item.loggedBy ? 5 : 0) + 5);
        doc.setFillColor(...bgCol); doc.roundedRect(margin, y, W-margin*2, rowH, 1.5, 1.5, 'F');
        doc.setTextColor(100,100,100); doc.setFontSize(8); doc.text(`${idx+1}.`, margin+2, y+5.5);
        doc.setTextColor(30,30,30); doc.setFontSize(9); doc.setFont('helvetica', 'bold');
        doc.text(statusStr, margin+8, y+5.5);
        doc.setFont('helvetica', 'normal');
        let ty = y + 5.5;
        lines.forEach(l => { doc.text(l, margin+16, ty); ty += 5; });
        if (item.notes) { doc.setTextColor(100,100,100); doc.setFontSize(7.5); doc.text('Note: ' + item.notes, margin+16, ty); ty += 4.5; }
        if (item.loggedBy) { doc.setTextColor(80,120,200); doc.setFontSize(7.5); doc.text(`Logged by ${item.loggedBy}${item.loggedLocation ? ' — ' + item.loggedLocation : ''}${item.loggedAt ? ' — ' + new Date(item.loggedAt).toLocaleDateString('en-GB') : ''}`, margin+16, ty); }
        y += rowH + 2;
      });
      // Footer
      doc.setFillColor(26,37,53); doc.rect(0, 287, W, 10, 'F');
      doc.setTextColor(193,167,106); doc.setFontSize(7); doc.text('Eyecon Moments — Confidential Revision Report', margin, 293);
      doc.save(`revision-${rev.title.replace(/\s+/g,'-').toLowerCase()}.pdf`);
    };

    return (
      <div className={`min-h-screen ${darkMode ? 'bg-gray-900' : 'bg-gray-100'}`}>
        {helpModalJSX}
        {NavBar()}
        <div className="p-4">
          <h2 className={`text-xl font-bold mb-4 ${darkMode ? 'text-white' : 'text-gray-800'}`}>📋 Revision Logs</h2>
          <div className="flex gap-4 flex-col lg:flex-row">

            {/* LEFT: Revision list */}
            <div className={`lg:w-72 shrink-0 ${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-lg shadow p-4`}>
              <p className={`text-xs font-semibold mb-2 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>NEW REVISION</p>
              <div className="flex gap-2 mb-4">
                <input value={revisionNewTitle} onChange={e => setRevisionNewTitle(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && addRevision()}
                  placeholder="e.g. v1.3 changes..."
                  className={`flex-1 px-2 py-1 rounded border text-sm ${darkMode ? 'bg-gray-700 text-white border-gray-600' : 'bg-white text-gray-800 border-gray-300'}`} />
                <button onClick={addRevision} className="bg-blue-500 text-white px-3 py-1 rounded text-sm font-semibold">+</button>
              </div>
              <div className="space-y-2">
                {revisions.length === 0 && <p className={`text-xs ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>No revision logs yet.</p>}
                {revisions.map(rev => {
                  const total = rev.items.length;
                  const done = rev.items.filter(i => i.status === 'green').length;
                  const amber = rev.items.filter(i => i.status === 'amber').length;
                  const red = rev.items.filter(i => i.status === 'red').length;
                  const isActive = selectedRevisionId === rev.id;
                  const today = new Date(); today.setHours(0,0,0,0);
                  const extraDays = (rev.extensions || 0) * 7;
                  const deadline = new Date(rev.date); deadline.setDate(deadline.getDate() + 30 + extraDays); deadline.setHours(0,0,0,0);
                  const daysLeft = Math.floor((deadline - today) / 86400000);
                  const urgentBorder = isActive ? 'border-blue-500' : rev.completed ? 'border-green-600' : daysLeft < 0 ? 'border-red-500' : daysLeft <= 3 ? 'border-red-500' : daysLeft <= 7 ? 'border-orange-500' : (darkMode ? 'border-gray-700' : 'border-gray-200');
                  return (
                    <div key={rev.id} onClick={() => setSelectedRevisionId(isActive ? null : rev.id)}
                      className={`p-3 rounded-lg border-2 cursor-pointer transition-all ${urgentBorder} ${darkMode ? 'bg-gray-700' : 'bg-gray-50'}`}>
                      <div className="flex items-start justify-between gap-1">
                        <div className="flex-1 min-w-0">
                          <p className={`font-semibold text-sm truncate ${rev.completed ? 'text-green-400' : (darkMode ? 'text-white' : 'text-gray-800')}`}>
                            {rev.completed ? '✅ ' : ''}{rev.title}
                          </p>
                          <p className={`text-xs ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>{rev.date} · {total} item{total !== 1 ? 's' : ''}</p>
                          {!rev.completed && (
                            <div className="flex items-center gap-2 mt-0.5">
                              <p className={`text-xs font-medium ${daysLeft < 0 ? 'text-red-400' : daysLeft <= 3 ? 'text-red-400' : daysLeft <= 7 ? 'text-orange-400' : daysLeft <= 14 ? 'text-yellow-400' : 'text-green-400'}`}>
                                {daysLeft < 0 ? `⚠️ ${Math.abs(daysLeft)}d overdue` : daysLeft === 0 ? '⚠️ Due today' : `⏳ ${daysLeft}d left`}
                              </p>
                              {rev.extensions > 0 && <span className="text-xs text-blue-400">(+{rev.extensions * 7}d ext.)</span>}
                            </div>
                          )}
                        </div>
                        <button onClick={e => { e.stopPropagation(); deleteRevision(rev.id); }} className="text-red-400 hover:text-red-300 text-xs shrink-0">🗑</button>
                      </div>
                      {total > 0 && (
                        <div className="mt-2 flex h-1.5 rounded overflow-hidden">
                          {done > 0 && <div className="bg-green-500" style={{width:`${(done/total)*100}%`}}></div>}
                          {amber > 0 && <div className="bg-amber-400" style={{width:`${(amber/total)*100}%`}}></div>}
                          {red > 0 && <div className="bg-red-500" style={{width:`${(red/total)*100}%`}}></div>}
                          {(total-done-amber-red) > 0 && <div className={`flex-1 ${darkMode ? 'bg-gray-600' : 'bg-gray-300'}`}></div>}
                        </div>
                      )}
                      {total > 0 && (
                        <p className="text-xs mt-1">
                          {done > 0 && <span className="text-green-400 mr-1">✅{done}</span>}
                          {amber > 0 && <span className="text-amber-400 mr-1">🟡{amber}</span>}
                          {red > 0 && <span className="text-red-400 mr-1">❌{red}</span>}
                          {(total-done-amber-red) > 0 && <span className={darkMode ? 'text-gray-500' : 'text-gray-400'}>⬜{total-done-amber-red}</span>}
                        </p>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* RIGHT: Selected revision detail */}
            {selectedRev ? (
              <div className={`flex-1 ${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-lg shadow p-4`}>
                {/* Header row */}
                {(() => {
                  const today2 = new Date(); today2.setHours(0,0,0,0);
                  const extraDays2 = (selectedRev.extensions || 0) * 7;
                  const deadline2 = new Date(selectedRev.date); deadline2.setDate(deadline2.getDate() + 30 + extraDays2); deadline2.setHours(0,0,0,0);
                  const daysLeft2 = Math.floor((deadline2 - today2) / 86400000);
                  return (
                <div className="flex flex-wrap items-start justify-between gap-2 mb-3">
                  <div>
                    <h3 className={`font-bold text-lg ${darkMode ? 'text-white' : 'text-gray-800'}`}>{selectedRev.title}</h3>
                    <p className={`text-xs ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>{selectedRev.date}</p>
                    {!selectedRev.completed && (
                      <p className={`text-xs font-medium mt-0.5 ${daysLeft2 < 0 ? 'text-red-400' : daysLeft2 <= 7 ? 'text-orange-400' : 'text-green-400'}`}>
                        {daysLeft2 < 0 ? `⚠️ ${Math.abs(daysLeft2)}d overdue` : daysLeft2 === 0 ? '⚠️ Due today' : `⏳ Due in ${daysLeft2}d`}
                        {selectedRev.extensions > 0 && <span className="ml-1 text-blue-400">(+{selectedRev.extensions * 7}d extension{selectedRev.extensions > 1 ? 's' : ''})</span>}
                        {' · '}deadline {deadline2.toLocaleDateString('en-GB')}
                      </p>
                    )}
                    {selectedRev.completed && <p className="text-xs text-green-400 mt-0.5">✅ Completed by {selectedRev.completedBy} · {new Date(selectedRev.completedAt).toLocaleDateString('en-GB')}</p>}
                  </div>
                  <div className="flex flex-wrap gap-2">
                    {!selectedRev.completed && (
                      <button
                        onClick={() => extendRevision(selectedRev.id)}
                        className="px-3 py-1.5 rounded text-xs font-semibold bg-blue-600 hover:bg-blue-700 text-white"
                        title="Customer slow to reply — adds 7 more days">
                        ⏳ Awaiting reply (+7d)
                      </button>
                    )}
                    <button
                      onClick={() => markRevisionComplete(selectedRev.id)}
                      className={`px-3 py-1.5 rounded text-xs font-semibold ${selectedRev.completed ? 'bg-gray-500 hover:bg-gray-600 text-white' : 'bg-green-500 hover:bg-green-600 text-white'}`}>
                      {selectedRev.completed ? '↩ Reopen' : '✅ Mark Complete'}
                    </button>
                    <button
                      onClick={() => downloadRevisionPDF(selectedRev)}
                      className="px-3 py-1.5 rounded text-xs font-semibold bg-purple-600 hover:bg-purple-700 text-white">
                      ⬇ Download PDF
                    </button>
                  </div>
                </div>
                  );
                })()}

                {/* AI Screenshot Scanner — always shown when a revision is selected */}
                <div className={`mb-4 p-3 rounded-lg border-2 border-dashed ${darkMode ? 'border-purple-700 bg-purple-900/20' : 'border-purple-300 bg-purple-50'}`}>
                  <div className="flex items-center justify-between mb-2">
                    <div>
                      <p className={`text-xs font-semibold ${darkMode ? 'text-purple-300' : 'text-purple-700'}`}>🤖 AI SCREENSHOT READER</p>
                      <p className={`text-xs mt-0.5 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>Upload an Instagram or WhatsApp screenshot — AI will extract the revision requests automatically</p>
                    </div>
                    {revisionScanLoading && <span className="text-purple-400 text-sm animate-pulse">Scanning…</span>}
                  </div>

                  {!revisionScanPreview && (
                    <label className={`cursor-pointer flex items-center justify-center gap-2 px-4 py-2 rounded-lg border ${darkMode ? 'bg-purple-800 border-purple-600 text-purple-200 hover:bg-purple-700' : 'bg-purple-600 border-purple-600 text-white hover:bg-purple-700'} text-sm font-semibold w-full`}>
                      {revisionScanLoading ? '⏳ Reading screenshot…' : '📷 Upload Screenshot'}
                      <input type="file" accept="image/*" className="hidden" disabled={revisionScanLoading}
                        onChange={e => { const f = e.target.files?.[0]; if (f) scanRevisionScreenshot(selectedRev.id, f); e.target.value = ''; }} />
                    </label>
                  )}

                  {revisionScanPreview && revisionScanPreview.revId === selectedRev.id && (
                    <div>
                      <p className={`text-xs font-semibold mb-2 ${darkMode ? 'text-green-400' : 'text-green-700'}`}>✅ Found {revisionScanPreview.items.length} revision{revisionScanPreview.items.length !== 1 ? 's' : ''} — review and confirm:</p>
                      <div className={`rounded-lg p-2 mb-3 space-y-1 max-h-48 overflow-y-auto ${darkMode ? 'bg-gray-700' : 'bg-white border border-gray-200'}`}>
                        {revisionScanPreview.items.map((item, i) => (
                          <div key={i} className="flex items-start gap-2">
                            <span className={`text-xs mt-0.5 shrink-0 ${darkMode ? 'text-gray-400' : 'text-gray-400'}`}>{i+1}.</span>
                            <p className={`text-xs ${darkMode ? 'text-white' : 'text-gray-800'}`}>{item}</p>
                          </div>
                        ))}
                      </div>
                      <div className="flex gap-2">
                        <button onClick={confirmScanPreview} className="flex-1 bg-green-500 text-white px-3 py-1.5 rounded text-sm font-semibold">✅ Add All to Log</button>
                        <button onClick={() => setRevisionScanPreview(null)} className={`px-3 py-1.5 rounded text-sm font-semibold ${darkMode ? 'bg-gray-600 text-gray-300' : 'bg-gray-200 text-gray-600'}`}>✕ Discard</button>
                        <label className={`px-3 py-1.5 rounded text-sm font-semibold cursor-pointer ${darkMode ? 'bg-purple-700 text-purple-200' : 'bg-purple-100 text-purple-700'}`}>
                          🔄 Re-scan
                          <input type="file" accept="image/*" className="hidden"
                            onChange={e => { const f = e.target.files?.[0]; if (f) scanRevisionScreenshot(selectedRev.id, f); e.target.value = ''; }} />
                        </label>
                      </div>
                    </div>
                  )}
                </div>

                {/* Paste block */}
                {!selectedRev.completed && (
                  <div className={`mb-4 p-3 rounded-lg border ${darkMode ? 'border-gray-600 bg-gray-700' : 'border-gray-200 bg-gray-50'}`}>
                    <p className={`text-xs font-semibold mb-1 ${darkMode ? 'text-gray-300' : 'text-gray-600'}`}>PASTE CHANGES (one per line)</p>
                    <textarea value={revisionPasteText} onChange={e => setRevisionPasteText(e.target.value)} rows={3}
                      placeholder={"Remove hardware dropdown\nFix email links\nAdd admin price field\n..."}
                      className={`w-full px-2 py-1 rounded border text-sm font-mono ${darkMode ? 'bg-gray-600 text-white border-gray-500' : 'bg-white text-gray-800 border-gray-300'}`} />
                    <button onClick={() => pasteItems(selectedRev.id)} className="mt-2 bg-blue-500 text-white px-4 py-1 rounded text-sm font-semibold">Add Items</button>
                  </div>
                )}

                {/* Items list */}
                <div className="space-y-2">
                  {selectedRev.items.length === 0 && (
                    <p className={`text-sm text-center py-6 ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>No items yet — paste a list above or add individually.</p>
                  )}
                  {selectedRev.items.map((item, idx) => {
                    const isNotingThis = revisionNoteTarget?.revId === selectedRev.id && revisionNoteTarget?.itemId === item.id && revisionNoteTarget?.mode === 'note';
                    const isLoggingThis = revisionNoteTarget?.revId === selectedRev.id && revisionNoteTarget?.itemId === item.id && revisionNoteTarget?.mode === 'log';
                    const borderCol = item.status === 'green' ? 'border-green-500' : item.status === 'amber' ? 'border-amber-400' : item.status === 'red' ? 'border-red-500' : (darkMode ? 'border-gray-600' : 'border-gray-200');
                    const bgCol = item.status === 'green' ? (darkMode ? 'bg-green-900/20' : 'bg-green-50') : item.status === 'amber' ? (darkMode ? 'bg-amber-900/20' : 'bg-amber-50') : item.status === 'red' ? (darkMode ? 'bg-red-900/20' : 'bg-red-50') : (darkMode ? 'bg-gray-700' : 'bg-gray-50');
                    return (
                      <div key={item.id} className={`rounded-lg border-l-4 p-3 ${borderCol} ${bgCol}`}>
                        <div className="flex items-start gap-2">
                          <span className={`text-xs mt-0.5 shrink-0 ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>{idx+1}.</span>
                          <div className="flex-1 min-w-0">
                            <p className={`text-sm ${darkMode ? 'text-white' : 'text-gray-800'}`}>{item.text}</p>
                            {item.loggedBy && (
                              <p className="text-xs mt-0.5 text-blue-400">👤 {item.loggedBy}{item.loggedLocation ? ` — ${item.loggedLocation}` : ''}{item.loggedAt ? ` · ${new Date(item.loggedAt).toLocaleDateString('en-GB')}` : ''}</p>
                            )}
                            {item.notes && !isNotingThis && (
                              <p className={`text-xs mt-0.5 italic ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>📝 {item.notes}</p>
                            )}
                            {isNotingThis && (
                              <div className="mt-1 flex gap-1">
                                <input autoFocus defaultValue={item.notes}
                                  onChange={e => setRevisionNoteText(e.target.value)}
                                  onKeyDown={e => { if (e.key === 'Enter') saveItemNote(selectedRev.id, item.id, revisionNoteText || e.target.value); if (e.key === 'Escape') setRevisionNoteTarget(null); }}
                                  placeholder="Add a note..."
                                  className={`flex-1 px-2 py-0.5 rounded border text-xs ${darkMode ? 'bg-gray-600 text-white border-gray-500' : 'bg-white text-gray-800 border-gray-300'}`} />
                                <button onClick={() => saveItemNote(selectedRev.id, item.id, revisionNoteText)} className="bg-blue-500 text-white px-2 py-0.5 rounded text-xs">Save</button>
                              </div>
                            )}
                            {isLoggingThis && (
                              <div className="mt-1 flex gap-1 items-center">
                                <span className="text-xs text-blue-400">Where completed:</span>
                                <input autoFocus
                                  onChange={e => setRevisionNoteText(e.target.value)}
                                  onKeyDown={e => { if (e.key === 'Enter') logItemCompletion(selectedRev.id, item.id, revisionNoteText || e.target.value); if (e.key === 'Escape') setRevisionNoteTarget(null); }}
                                  placeholder="e.g. Premiere, PC1, Drive E..."
                                  className={`flex-1 px-2 py-0.5 rounded border text-xs ${darkMode ? 'bg-gray-600 text-white border-gray-500' : 'bg-white text-gray-800 border-gray-300'}`} />
                                <button onClick={() => logItemCompletion(selectedRev.id, item.id, revisionNoteText)} className="bg-green-500 text-white px-2 py-0.5 rounded text-xs">Log ✓</button>
                              </div>
                            )}
                          </div>
                          {/* Buttons */}
                          <div className="flex items-center gap-1 shrink-0">
                            {!selectedRev.completed && (
                              <button
                                onClick={() => { setRevisionNoteTarget(isLoggingThis ? null : { revId: selectedRev.id, itemId: item.id, mode: 'log' }); setRevisionNoteText(''); }}
                                className={`text-xs px-1.5 py-0.5 rounded border ${isLoggingThis ? 'bg-blue-500 text-white border-blue-500' : (darkMode ? 'border-gray-500 text-gray-400 hover:text-blue-400' : 'border-gray-300 text-gray-400 hover:text-blue-500')}`}
                                title="Log completion">👤</button>
                            )}
                            <button onClick={() => updateItemStatus(selectedRev.id, item.id, 'green')}
                              className={`w-5 h-5 rounded-full border-2 transition-all ${item.status === 'green' ? 'bg-green-500 border-green-500' : (darkMode ? 'border-gray-500 hover:border-green-400' : 'border-gray-300 hover:border-green-400')}`} title="Done" />
                            <button onClick={() => updateItemStatus(selectedRev.id, item.id, 'amber')}
                              className={`w-5 h-5 rounded-full border-2 transition-all ${item.status === 'amber' ? 'bg-amber-400 border-amber-400' : (darkMode ? 'border-gray-500 hover:border-amber-400' : 'border-gray-300 hover:border-amber-400')}`} title="Partial" />
                            <button onClick={() => updateItemStatus(selectedRev.id, item.id, 'red')}
                              className={`w-5 h-5 rounded-full border-2 transition-all ${item.status === 'red' ? 'bg-red-500 border-red-500' : (darkMode ? 'border-gray-500 hover:border-red-400' : 'border-gray-300 hover:border-red-400')}`} title="Issue" />
                            <button
                              onClick={() => { setRevisionNoteTarget(isNotingThis ? null : { revId: selectedRev.id, itemId: item.id, mode: 'note' }); setRevisionNoteText(item.notes || ''); }}
                              className={`text-sm px-0.5 ${isNotingThis ? 'text-blue-400' : (darkMode ? 'text-gray-500 hover:text-gray-300' : 'text-gray-400 hover:text-gray-600')}`} title="Note">📝</button>
                            {item.status !== null && (
                              <button onClick={() => updateItemStatus(selectedRev.id, item.id, null)}
                                className={`text-xs ${darkMode ? 'text-gray-500 hover:text-gray-300' : 'text-gray-400 hover:text-gray-600'}`} title="Clear">✕</button>
                            )}
                            <button onClick={() => deleteItem(selectedRev.id, item.id)} className="text-red-400 hover:text-red-300 text-xs">🗑</button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Add single item */}
                {!selectedRev.completed && (
                  <div className="mt-4 flex gap-2">
                    <input id="singleItemInput" placeholder="Add a single item..."
                      className={`flex-1 px-2 py-1 rounded border text-sm ${darkMode ? 'bg-gray-700 text-white border-gray-600' : 'bg-white text-gray-800 border-gray-300'}`}
                      onKeyDown={e => { if (e.key === 'Enter') { addSingleItem(selectedRev.id, e.target.value); e.target.value = ''; } }} />
                    <button onClick={() => { const el = document.getElementById('singleItemInput'); addSingleItem(selectedRev.id, el.value); el.value = ''; }}
                      className="bg-green-500 text-white px-3 py-1 rounded text-sm font-semibold">+ Add</button>
                  </div>
                )}
              </div>
            ) : (
              <div className={`flex-1 flex items-center justify-center rounded-lg ${darkMode ? 'bg-gray-800' : 'bg-white'} shadow min-h-48`}>
                <p className={`text-sm ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>← Select a revision log to view its changes</p>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ── Global Progress Modal (clock-out slider) — rendered outside any view ──
  if (progressModal) {
    return (
      <div className="fixed inset-0 bg-black bg-opacity-70 z-[9999] flex items-end sm:items-center justify-center p-4">
        <div className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-2xl shadow-xl w-full max-w-sm`}>
          <div className="p-5">
            <h3 className={`font-bold text-lg mb-0.5 ${darkMode ? 'text-white' : 'text-gray-900'}`}>How far did you get? 📊</h3>
            <p className={`text-sm mb-5 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>Slide to show your progress today</p>
            <div className="text-center mb-2">
              <span className={`text-6xl font-bold tabular-nums ${progressModal.percent >= 80 ? 'text-green-500' : progressModal.percent >= 50 ? 'text-amber-500' : 'text-red-500'}`}>
                {progressModal.percent}%
              </span>
            </div>
            <input type="range" min="0" max="100" step="5"
              value={progressModal.percent}
              onChange={e => setProgressModal(p => ({ ...p, percent: parseInt(e.target.value) }))}
              className="w-full mb-2 accent-blue-500" style={{height:'28px', cursor:'pointer'}} />
            <div className={`h-2.5 rounded-full mb-5 ${darkMode ? 'bg-gray-700' : 'bg-gray-200'}`}>
              <div className={`h-2.5 rounded-full transition-all ${progressModal.percent >= 80 ? 'bg-green-500' : progressModal.percent >= 50 ? 'bg-amber-500' : 'bg-red-400'}`}
                style={{ width: progressModal.percent + '%' }} />
            </div>
            <input type="text" placeholder="Add a note (optional)"
              value={progressModal.note}
              onChange={e => setProgressModal(p => ({ ...p, note: e.target.value }))}
              className={`w-full px-3 py-2 border rounded-lg text-sm mb-4 ${darkMode ? 'bg-gray-700 border-gray-600 text-white placeholder-gray-500' : 'border-gray-300 placeholder-gray-400'}`} />
            <div className="grid grid-cols-2 gap-3">
              <button onClick={() => setProgressModal(null)}
                className={`py-2.5 rounded-xl font-semibold ${darkMode ? 'bg-gray-700 text-white' : 'bg-gray-100 text-gray-700'}`}>
                Cancel
              </button>
              <button onClick={() => { handleClockOut(progressModal.entryId, progressModal.percent, progressModal.note.trim() || null); setProgressModal(null); }}
                className="py-2.5 rounded-xl font-semibold bg-red-500 text-white hover:bg-red-600">
                🛑 Clock Out
              </button>
            </div>
            <button onClick={() => { handleClockOut(progressModal.entryId, null, null); setProgressModal(null); }}
              className={`w-full mt-2 text-xs py-1.5 ${darkMode ? 'text-gray-600 hover:text-gray-400' : 'text-gray-400 hover:text-gray-600'}`}>
              Skip — clock out without logging progress
            </button>
          </div>
        </div>
      </div>
    );
  }

  return null;
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  componentDidCatch(error) { this.setState({ error }); }
  render() {
    if (this.state.error) return (
      <div style={{padding:20,background:'#fee',fontFamily:'monospace',whiteSpace:'pre-wrap'}}>
        <h2>App Error:</h2><p>{this.state.error.toString()}</p>
      </div>
    );
    return this.props.children;
  }
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><EyeconMoments /></ErrorBoundary>);
    </script>
</body>
</html>
