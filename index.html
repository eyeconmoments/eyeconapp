                  <div className="grid grid-cols-2 gap-3 pt-1">
                    <button onClick={() => setShowAvailabilityModal(false)}
                      className={`py-2 rounded-lg font-semibold ${darkMode ? 'bg-gray-700 text-white' : 'bg-gray-100 text-gray-700'}`}>Cancel</button>
                    <button onClick={submitAvailabilityRequest} disabled={!availForm.startDate}
                      className={`py-2 rounded-lg font-semibold text-white ${availForm.startDate ? '' : 'opacity-50 cursor-not-allowed'}`} style={{background:'var(--gold)'}}>
                      Submit Request
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      </div>
    );
  }

  // TIMESHEETS
  if (currentView === 'timesheets') {
    const filteredEntries = getFilteredTimeEntries();
    const totalHours = filteredEntries.reduce((acc, e) => acc + e.hoursWorked, 0);
    
    const dm = darkMode;
    return (
      <div className={`min-h-screen ${dm ? 'bg-gray-900' : 'bg-gray-50'}`}>
        {helpModalJSX}
        {NavBar()}
        <div className="p-4 space-y-4">
          {/* Filters + Total */}
          <div className={`${dm ? 'bg-gray-800' : 'bg-white'} rounded-lg shadow p-4`}>
            <div className="flex gap-2 mb-4">
              <select value={timesheetFilter} onChange={(e) => setTimesheetFilter(e.target.value)}
                className={`flex-1 px-3 py-2 border rounded ${dm ? 'bg-gray-700 border-gray-600 text-white' : ''}`}>
                <option value="this-week">This Week</option>
                <option value="this-month">This Month</option>
                <option value="this-year">This Year</option>
                <option value="all">All Time</option>
              </select>
              <select value={selectedEmployee} onChange={(e) => setSelectedEmployee(e.target.value)}
                className={`flex-1 px-3 py-2 border rounded ${dm ? 'bg-gray-700 border-gray-600 text-white' : ''}`}>
                <option value="all">All Employees</option>
                {employees.filter(e => e.role === 'employee' || e.canBeAssigned).map(emp => <option key={emp.id} value={emp.id}>{emp.name}</option>)}
              </select>
            </div>
            <div className={`p-4 rounded-lg ${dm ? 'bg-blue-900' : 'bg-blue-50'}`}>
              <p className={`text-sm ${dm ? 'text-blue-300' : 'text-gray-600'}`}>Total Hours</p>
              <p className="text-3xl font-bold text-blue-500">{totalHours.toFixed(1)}h</p>
            </div>
          </div>

          {/* Per-Job Staff Breakdown */}
          {(() => {
            const jobsWithTime = editingJobs.filter(job => filteredEntries.some(e => e.jobId === job.id));
            if (jobsWithTime.length === 0) return null;
            return (
              <div className={`${dm ? 'bg-gray-800' : 'bg-white'} rounded-lg shadow`}>
                <div className={`p-4 border-b ${dm ? 'border-gray-700' : ''}`}>
                  <h3 className={`font-bold ${dm ? 'text-white' : 'text-gray-800'}`}>👥 My Assignments &amp; Jobs — Staff Hours by Part</h3>
                  <p className={`text-xs mt-1 ${dm ? 'text-gray-400' : 'text-gray-500'}`}>Hours each staff member spent on each job and which part they worked on</p>
                </div>
                <div className={`divide-y ${dm ? 'divide-gray-700' : ''}`}>
                  {jobsWithTime.map(job => {
                    const jobEntries = filteredEntries.filter(e => e.jobId === job.id);
                    const staffOnJob = employees
                      .map(emp => {
                        const hrs = jobEntries.filter(e => e.employeeId === emp.id).reduce((acc, e) => acc + (e.hoursWorked || 0), 0);
                        const parts = [];
                        if (job.hasPhotos && job.photoAssignedTo === emp.id) parts.push('📸 Photo Editing');
                        if (job.hasVideo) job.stages.filter(s => s.assignedTo === emp.id).forEach(s => parts.push('🎥 ' + s.name.split(',')[0]));
                        return { name: emp.name, hours: hrs, parts };
                      })
                      .filter(e => e.hours > 0 || e.parts.length > 0);
                    return (
                      <div key={job.id} className="p-4">
                        <div className="flex justify-between items-start mb-2">
                          <div>
                            <p className={`font-semibold ${dm ? 'text-white' : 'text-gray-800'}`}>{job.jobName}</p>
                            <p className={`text-xs ${dm ? 'text-gray-400' : 'text-gray-500'}`}>{job.customerName}</p>
                          </div>
                          <p className="text-sm font-bold text-blue-500">{jobEntries.reduce((a, e) => a + (e.hoursWorked || 0), 0).toFixed(1)}h total</p>
                        </div>
                        <div className="space-y-1">
                          {staffOnJob.map(emp => (
                            <div key={emp.name} className={`flex items-start justify-between text-sm rounded px-2 py-1 ${dm ? 'bg-gray-700' : 'bg-gray-50'}`}>
                              <div className="flex-1">
                                <span className={`font-medium ${dm ? 'text-gray-200' : 'text-gray-800'}`}>{emp.name}</span>
                                {emp.parts.length > 0 && <span className={`text-xs ml-1 ${dm ? 'text-gray-400' : 'text-gray-500'}`}>— {emp.parts.join(', ')}</span>}
                              </div>
                              <span className={`ml-2 font-semibold text-xs ${emp.hours > 0 ? 'text-green-500' : (dm ? 'text-gray-500' : 'text-gray-400')}`}>
                                {emp.hours > 0 ? `${emp.hours.toFixed(1)}h` : 'Assigned, 0h'}
                              </span>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          {/* All Time Entries */}
          <div className={`${dm ? 'bg-gray-800' : 'bg-white'} rounded-lg shadow`}>
            <div className={`p-4 border-b ${dm ? 'border-gray-700' : ''}`}>
              <h3 className={`font-bold ${dm ? 'text-white' : 'text-gray-800'}`}>Time Entries ({filteredEntries.length})</h3>
            </div>
            <div className={`divide-y ${dm ? 'divide-gray-700' : ''}`}>
              {filteredEntries.map(entry => {
                const employee = employees.find(e => e.id === entry.employeeId);
                return (
                  <div key={entry.id} className="p-4">
                    <div className="flex justify-between items-start mb-2">
                      <div>
                        <p className={`font-semibold ${dm ? 'text-white' : 'text-gray-800'}`}>{employee?.name}</p>
                        <p className={`text-sm ${dm ? 'text-gray-400' : 'text-gray-600'}`}>
                          {entry.jobId
                            ? getJobName(entry.jobId)
                            : <span><span className={`text-xs px-1.5 py-0.5 rounded font-semibold mr-1 ${dm ? 'bg-blue-900 text-blue-300' : 'bg-blue-100 text-blue-600'}`}>General</span><span className="italic">{entry.description || 'General Work'}</span></span>
                          }
                        </p>
                        <p className={`text-xs ${dm ? 'text-gray-500' : 'text-gray-400'}`}>{formatDate(entry.clockIn)}</p>
                      </div>
                      <div className="text-right">
                        <p className="text-lg font-bold text-green-500">{entry.hoursWorked}h</p>
                        <p className={`text-xs ${dm ? 'text-gray-500' : 'text-gray-400'}`}>{formatTime(entry.clockIn)} - {formatTime(entry.clockOut)}</p>
                        {entry.progressPercent !== null && (
                          <div className="flex items-center justify-end gap-1.5 mt-1">
                            <div className={`w-14 h-1.5 rounded-full ${dm ? 'bg-gray-700' : 'bg-gray-200'}`}>
                              <div className={`h-1.5 rounded-full ${entry.progressPercent >= 80 ? 'bg-green-500' : entry.progressPercent >= 50 ? 'bg-amber-500' : 'bg-red-400'}`}
                                style={{width: entry.progressPercent + '%'}} />
                            </div>
                            <span className={`text-xs font-semibold ${entry.progressPercent >= 80 ? 'text-green-500' : entry.progressPercent >= 50 ? 'text-amber-500' : 'text-red-400'}`}>{entry.progressPercent}%</span>
                          </div>
                        )}
                      </div>
                    </div>
                    {employee && (() => {
                      const job = editingJobs.find(j => j.id === entry.jobId);
                      const stageEarnings = job ? (job.stages || []).filter(s => s.assignedTo === employee.id && s.status === 'completed').reduce((a, s) => a + getStageRate(s.name, job), 0) + (job.hasPhotos && job.photoAssignedTo === employee.id && job.photoStatus === 'completed' ? getPhotoRate(job) : 0) : 0;
                      return stageEarnings > 0 ? <p className={`text-xs ${dm ? 'text-gray-400' : 'text-gray-500'}`}>Stage pay: £{stageEarnings}</p> : null;
                    })()}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ANALYTICS
  if (currentView === 'analytics') {
    // Only include jobs whose shoot date has passed (not today or future) — upcoming jobs excluded from all stats
    const _analyticsTodayMidnight = new Date(); _analyticsTodayMidnight.setHours(0, 0, 0, 0);
    const pastJobs = editingJobs.filter(job => !job.shootDate || new Date(job.shootDate) < _analyticsTodayMidnight);

    const totalJobs = pastJobs.length + archivedJobIds.length; // include archived so % doesn't drop when archiving
    const activeJobsCount = activeJobs.length;
    const archivedCount = archivedJobIds.length;

    // Filter jobs based on profitability filter
    const getFilteredJobsForProfitability = () => {
      if (profitabilityFilter === 'all-time') {
        return pastJobs;
      } else if (profitabilityFilter === 'year') {
        return pastJobs.filter(job => new Date(job.shootDate).getFullYear() === selectedYear);
      } else if (profitabilityFilter === 'month') {
        return pastJobs.filter(job => {
          const date = new Date(job.shootDate);
          return date.getFullYear() === selectedYear && (date.getMonth() + 1) === selectedMonth;
        });
      }
      return pastJobs;
    };
    
    const filteredJobsForProfit = getFilteredJobsForProfitability();
    
    // Profitability calculations
    const totalRevenue = filteredJobsForProfit.reduce((acc, job) => acc + calculateJobRevenue(job), 0);
    const totalCosts = filteredJobsForProfit.reduce((acc, job) => acc + calculateJobCosts(job), 0);
    const totalProfit = totalRevenue - totalCosts;
    const overallMargin = totalRevenue > 0 ? ((totalProfit / totalRevenue) * 100).toFixed(1) : 0;
    const avgRevenuePerJob = filteredJobsForProfit.length > 0 ? (totalRevenue / filteredJobsForProfit.length).toFixed(0) : 0;
    const avgProfitPerJob = filteredJobsForProfit.length > 0 ? (totalProfit / filteredJobsForProfit.length).toFixed(0) : 0;
    
    // Get available years from jobs
    const availableYears = [...new Set(pastJobs.map(job => new Date(job.shootDate).getFullYear()))].sort((a, b) => b - a);
    
    // Monthly breakdown for selected year
    const monthlyProfitData = [];
    for (let month = 1; month <= 12; month++) {
      const monthJobs = pastJobs.filter(job => {
        const date = new Date(job.shootDate);
        return date.getFullYear() === selectedYear && (date.getMonth() + 1) === month;
      });
      
      if (monthJobs.length > 0) {
        const monthRevenue = monthJobs.reduce((acc, job) => acc + calculateJobRevenue(job), 0);
        const monthCosts = monthJobs.reduce((acc, job) => acc + calculateJobCosts(job), 0);
        const monthProfit = monthRevenue - monthCosts;
        
        monthlyProfitData.push({
          month: new Date(selectedYear, month - 1).toLocaleDateString('en-US', { month: 'short' }),
          monthNumber: month,
          jobs: monthJobs.length,
          revenue: monthRevenue,
          costs: monthCosts,
          profit: monthProfit,
          margin: monthRevenue > 0 ? ((monthProfit / monthRevenue) * 100).toFixed(1) : 0
        });
      }
    }
    
    // Yearly breakdown
    const yearlyProfitData = availableYears.map(year => {
      const yearJobs = pastJobs.filter(job => new Date(job.shootDate).getFullYear() === year);
      const yearRevenue = yearJobs.reduce((acc, job) => acc + calculateJobRevenue(job), 0);
      const yearCosts = yearJobs.reduce((acc, job) => acc + calculateJobCosts(job), 0);
      const yearProfit = yearRevenue - yearCosts;
      
      return {
        year,
        jobs: yearJobs.length,
        revenue: yearRevenue,
        costs: yearCosts,
        profit: yearProfit,
        margin: yearRevenue > 0 ? ((yearProfit / yearRevenue) * 100).toFixed(1) : 0
      };
    });
    
    // Overall completion calculations
    const activeJobsList = pastJobs.filter(job => !archivedJobIds.includes(job.id));
    
    // Photo completion
    const totalPhotoJobs = activeJobsList.filter(j => j.hasPhotos).length;
    const completedPhotoJobs = activeJobsList.filter(j => j.hasPhotos && j.photoStatus === 'completed').length;
    const photoCompletionRate = totalPhotoJobs > 0 ? ((completedPhotoJobs / totalPhotoJobs) * 100).toFixed(0) : 0;
    
    // Video completion (by stages)
    let totalVideoStages = 0;
    let completedVideoStages = 0;
    activeJobsList.forEach(job => {
      if (job.hasVideo && job.stages) {
        totalVideoStages += job.stages.length;
        completedVideoStages += job.stages.filter(s => s.status === 'completed').length;
      }
    });
    const videoCompletionRate = totalVideoStages > 0 ? ((completedVideoStages / totalVideoStages) * 100).toFixed(0) : 0;
    
    // Overall completion

                  <div key={job.id} className={`border rounded-lg p-3 ${darkMode ? 'border-gray-700' : ''}`}>
                    <div className="flex justify-between items-start mb-2">
                      <div className="flex-1">
                        <p className={`font-semibold text-sm ${darkMode ? 'text-white' : ''}`}>{job.jobName}</p>
                        <p className={`text-xs ${darkMode ? 'text-gray-400' : 'text-gray-600'}`}>{job.customerName}</p>
                        {isCustomPrice && <span className={`text-xs px-2 py-1 rounded mt-1 inline-block ${darkMode ? 'bg-yellow-900 text-yellow-300' : 'bg-yellow-100 text-yellow-700'}`}>Custom Price</span>}
                      </div>
                      <span className={`text-xs px-2 py-1 rounded ${
                        margin >= 60 ? darkMode ? 'bg-green-900 text-green-300' : 'bg-green-100 text-green-700' :
                        margin >= 40 ? darkMode ? 'bg-blue-900 text-blue-300' : 'bg-blue-100 text-blue-700' :
                        margin >= 20 ? darkMode ? 'bg-yellow-900 text-yellow-300' : 'bg-yellow-100 text-yellow-700' :
                        darkMode ? 'bg-red-900 text-red-300' : 'bg-red-100 text-red-700'
                      }`}>
                        {margin}% margin
                      </span>
                    </div>
                    <div className="grid grid-cols-3 gap-2 text-xs">
                      <div className={`text-center p-2 rounded ${darkMode ? 'bg-gray-700' : 'bg-green-50'}`}>
                        <p className={darkMode ? 'text-gray-400' : 'text-gray-600'}>Revenue</p>
                        <p className="font-bold text-green-500">£{revenue.toFixed(0)}</p>
                      </div>
                      <div className={`text-center p-2 rounded ${darkMode ? 'bg-gray-700' : 'bg-red-50'}`}>
                        <p className={darkMode ? 'text-gray-400' : 'text-gray-600'}>Costs</p>
                        <p className="font-bold text-red-500">£{costs.toFixed(0)}</p>
                      </div>
                      <div className={`text-center p-2 rounded ${darkMode ? 'bg-gray-700' : 'bg-blue-50'}`}>
                        <p className={darkMode ? 'text-gray-400' : 'text-gray-600'}>Profit</p>
                        <p className="font-bold text-blue-400">£{profit.toFixed(0)}</p>
                      </div>
                    </div>
                    <div className={`mt-2 text-xs ${darkMode ? 'text-gray-500' : 'text-gray-500'}`}>
                      <p>Shoot: {job.shootHours}h × {(job.numVideographers || 0) + (job.numPhotographers || 0)} staff = £{((job.shootHours || 0) * ((job.numVideographers || 0) + (job.numPhotographers || 0)) * 13).toFixed(0)}</p>
                      {job.hasVideo && (
                        <p>Video stages: {job.stages.map(s => s.status === 'completed' ? `£${getStageRate(s.name, job)}` : null).filter(Boolean).join(' + ') || 'None completed'}</p>
                      )}
                      {job.hasPhotos && (
                        <p>Photo edit: {job.photoStatus === 'completed' ? '£60' : '£0 (not completed)'}</p>
                      )}
                      <p>Staff pay: {(() => { const stageTotal = job.stages?.filter(s => s.status === 'completed').reduce((a, s) => a + getStageRate(s.name, job), 0) || 0; const photoTotal = job.hasPhotos && job.photoStatus === 'completed' ? getPhotoRate(job) : 0; return `£${stageTotal + photoTotal}`; })()} in completed stages</p>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Yearly Breakdown */}
          {profitabilityFilter === 'all-time' && yearlyProfitData.length > 0 && (
            <div className="bg-white rounded-lg shadow p-4">
              <h3 className="font-bold mb-4">📅 Yearly Breakdown</h3>
              <div className="space-y-3">
                {yearlyProfitData.map((yearData) => (
                  <div key={yearData.year} className="border rounded-lg p-3">
                    <div className="flex justify-between items-center mb-2">
                      <div>
                        <p className="font-bold text-lg">{yearData.year}</p>
                        <p className="text-xs text-gray-600">{yearData.jobs} jobs</p>
                      </div>
                      <span className={`text-xs px-2 py-1 rounded ${
                        yearData.margin >= 60 ? 'bg-green-100 text-green-700' :
                        yearData.margin >= 40 ? 'bg-blue-100 text-blue-700' :
                        yearData.margin >= 20 ? 'bg-yellow-100 text-yellow-700' :
                        'bg-red-100 text-red-700'
                      }`}>
                        {yearData.margin}% margin
                      </span>
                    </div>
                    <div className="grid grid-cols-3 gap-2">
                      <div className="text-center p-2 bg-green-50 rounded text-xs">
                        <p className="text-gray-600">Revenue</p>
                        <p className="font-bold text-green-600">£{yearData.revenue.toFixed(0)}</p>
                      </div>
                      <div className="text-center p-2 bg-red-50 rounded text-xs">
                        <p className="text-gray-600">Costs</p>
                        <p className="font-bold text-red-600">£{yearData.costs.toFixed(0)}</p>
                      </div>
                      <div className="text-center p-2 bg-blue-50 rounded text-xs">
                        <p className="text-gray-600">Profit</p>
                        <p className="font-bold text-blue-600">£{yearData.profit.toFixed(0)}</p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Monthly Breakdown */}
          {profitabilityFilter === 'year' && monthlyProfitData.length > 0 && (
            <div className="bg-white rounded-lg shadow p-4">
              <h3 className="font-bold mb-4">📊 Monthly Breakdown - {selectedYear}</h3>
              <div className="space-y-3">
                {monthlyProfitData.map((monthData) => (
                  <div key={monthData.monthNumber} className="border rounded-lg p-3">
                    <div className="flex justify-between items-center mb-2">
                      <div>
                        <p className="font-bold">{monthData.month}</p>
                        <p className="text-xs text-gray-600">{monthData.jobs} jobs</p>
                      </div>
                      <span className={`text-xs px-2 py-1 rounded ${
                        monthData.margin >= 60 ? 'bg-green-100 text-green-700' :
                        monthData.margin >= 40 ? 'bg-blue-100 text-blue-700' :
                        monthData.margin >= 20 ? 'bg-yellow-100 text-yellow-700' :
                        'bg-red-100 text-red-700'
                      }`}>
                        {monthData.margin}% margin
                      </span>
                    </div>
                    <div className="grid grid-cols-3 gap-2">
                      <div className="text-center p-2 bg-green-50 rounded text-xs">
                        <p className="text-gray-600">Revenue</p>
                        <p className="font-bold text-green-600">£{monthData.revenue.toFixed(0)}</p>
                      </div>
                      <div className="text-center p-2 bg-red-50 rounded text-xs">
                        <p className="text-gray-600">Costs</p>
                        <p className="font-bold text-red-600">£{monthData.costs.toFixed(0)}</p>
                      </div>
                      <div className="text-center p-2 bg-blue-50 rounded text-xs">
                        <p className="text-gray-600">Profit</p>
                        <p className="font-bold text-blue-600">£{monthData.profit.toFixed(0)}</p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Upcoming Jobs from Calendar */}
          {isGoogleSignedIn && upcomingJobs.length > 0 && (
            <div className="bg-white rounded-lg shadow p-4">
              <h3 className="font-bold mb-4">📅 Upcoming Jobs ({upcomingJobs.length})</h3>
              <div className="space-y-2">
                {upcomingJobs.slice(0, 10).map(event => {
                  const eventDate = new Date(event.start.dateTime || event.start.date);
                  const daysUntil = Math.ceil((eventDate - new Date()) / (1000 * 60 * 60 * 24));
                  
                  return (
                    <div key={event.id} className="flex justify-between items-center p-2 bg-blue-50 rounded text-sm">
                      <div>
                        <p className="font-semibold">{event.summary}</p>
                        <p className="text-xs text-gray-600">
                          {eventDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}
                        </p>
                      </div>
                      <span className="text-xs text-blue-600 font-semibold">
                        {daysUntil === 0 ? 'Today' : daysUntil === 1 ? 'Tomorrow' : `${daysUntil}d`}
                      </span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Status Overview */}
          <div className="bg-white rounded-lg shadow p-4">
            <h3 className="font-bold mb-4">📈 Status Overview</h3>
            <div className="space-y-2">
              <div className="flex justify-between items-center p-2 bg-red-50 rounded">
                <span className="text-sm">Overdue</span>
                <span className="font-bold text-red-600">{overdueJobs.length}</span>
              </div>
              <div className="flex justify-between items-center p-2 bg-yellow-50 rounded">
                <span className="text-sm">Due This Week</span>
                <span className="font-bold text-yellow-600">{dueSoonJobs.length}</span>
              </div>
              <div className="flex justify-between items-center p-2 bg-blue-50 rounded">
                <span className="text-sm">Active</span>
                <span className="font-bold text-blue-600">{activeJobsCount}</span>
              </div>
              <div className="flex justify-between items-center p-2 bg-green-50 rounded">
                <span className="text-sm">Currently Working</span>
                <span className="font-bold text-green-600">{activeTimeEntries.length}</span>
              </div>
            </div>
          </div>

          {/* Time Tracking by Job */}
          <div className="bg-white rounded-lg shadow p-4">
            <h3 className="font-bold mb-4">⏱️ Time Tracking by Job</h3>
            {jobTimeBreakdown.length === 0 ? (
              <p className="text-gray-500 text-center py-4">No time entries logged yet</p>
            ) : (
              <div className="space-y-3">
                {jobTimeBreakdown.map((job, idx) => (
                  <div key={idx} className="border rounded-lg p-3">
                    <div className="flex justify-between items-start mb-2">
                      <div className="flex-1">
                        <p className="font-semibold text-sm">{job.jobName}</p>
                        <p className="text-xs text-gray-500">{job.estimatedHours}h estimated</p>
                      </div>
                      <div className="text-right">
                        <p className="font-bold text-blue-600">{job.totalHours.toFixed(1)}h</p>
                        <span className={`text-xs px-2 py-1 rounded ${
                          job.efficiency <= 100 ? 'bg-green-100 text-green-700' :
                          job.efficiency <= 150 ? 'bg-yellow-100 text-yellow-700' :
                          'bg-red-100 text-red-700'
                        }`}>
                          {job.efficiency}% of estimate
                        </span>
                      </div>
                    </div>
                    <div className="space-y-1">
                      {Object.entries(job.employeeBreakdown).map(([empName, hours], i) => (
                        <div key={i} className="flex justify-between text-xs bg-gray-50 p-2 rounded">
                          <span className="text-gray-700">{empName}</span>
                          <span className="font-semibold text-gray-800">{hours.toFixed(1)}h</span>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Time Tracking by Employee */}
          <div className="bg-white rounded-lg shadow p-4">
            <h3 className="font-bold mb-4">👤 Time Tracking by Employee</h3>
            {employeeTimeBreakdown.length === 0 ? (
              <p className="text-gray-500 text-center py-4">No time entries logged yet</p>
            ) : (
              <div className="space-y-3">
                {employeeTimeBreakdown.map((emp, idx) => (
                  <div key={idx} className="border rounded-lg p-3">
                    <div className="flex justify-between items-start mb-2">
                      <div className="flex-1">
                        <p className="font-semibold">{emp.employeeName}</p>
                        <p className="text-xs text-gray-500">Avg {emp.avgHoursPerJob}h per job</p>
                      </div>
                      <div className="text-right">
                        <p className="font-bold text-purple-600">{emp.totalHours.toFixed(1)}h</p>
                        <p className="text-xs text-gray-500">{Object.keys(emp.jobBreakdown).length} jobs</p>
                      </div>
                    </div>
                    <div className="space-y-1">
                      {Object.entries(emp.jobBreakdown).map(([jobName, hours], i) => (
                        <div key={i} className="flex justify-between text-xs bg-gray-50 p-2 rounded">
                          <span className="text-gray-700">{jobName}</span>
                          <span className="font-semibold text-gray-800">{hours.toFixed(1)}h</span>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ── WAGES ────────────────────────────────────────────────────────────────────
  if (currentView === 'wages') {
    const isAdmin = currentUser?.role === 'admin' || currentUser?.role === 'manager';
    const dm = darkMode;

    const statusBadge = (status) => {
      const styles = { approved: 'bg-green-100 text-green-700', pending_approval: 'bg-orange-100 text-orange-700', rejected: 'bg-red-100 text-red-700', paid: 'bg-blue-100 text-blue-700' };
      const labels = { approved: 'Approved', pending_approval: 'Pending', rejected: 'Rejected', paid: 'Paid' };
      return <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${styles[status] || ''}`}>{labels[status] || status}</span>;
    };

    // ── Shoot wages (stored wageEntries type='shoot') ──────────────────────────
    const allShootEntries = editingJobs.flatMap(j =>
      (j.wageEntries || []).filter(e => e.type === 'shoot').map(e => ({ ...e, jobId: j.id, jobName: j.jobName, customerName: j.customerName, shootDate: j.shootDate }))
    );
    const visibleShootEntries = isAdmin ? allShootEntries : allShootEntries.filter(e => e.employeeId === currentUser?.id);
    const shootOwed = visibleShootEntries.filter(e => e.status === 'approved').reduce((a, e) => a + (e.amount || 0), 0);
    const shootPaid = visibleShootEntries.filter(e => e.status === 'paid').reduce((a, e) => a + (e.amount || 0), 0);
    const shootPending = allShootEntries.filter(e => e.status === 'pending_approval');

    // Pull shoot wages from Google Calendar
    const pullShootWagesFromCalendar = async () => {
      if (!isGoogleSignedIn) { alert('Please connect Google Calendar first (use the Sync button on the Jobs page).'); return; }
      try {
        const thirtyDaysAgo = new Date(); thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
        const response = await window.gapi.client.calendar.events.list({
          calendarId: 'primary', timeMin: thirtyDaysAgo.toISOString(), timeMax: new Date().toISOString(),
          showDeleted: false, singleEvents: true, orderBy: 'startTime'
        });
        const events = response.result.items || [];
        let created = 0;
        for (const event of events) {
          const eventDate = new Date(event.start?.dateTime || event.start?.date);
          const matchedJob = editingJobs.find(j =>
            j.calendarEventId === event.id ||
            (j.shootDate && Math.abs(new Date(j.shootDate) - eventDate) < 24 * 60 * 60 * 1000 &&
              j.jobName.toLowerCase().includes((event.summary || '').toLowerCase().split(' ')[0]))
          );
          if (!matchedJob) continue;
          const jobTimeEntries = timeEntries.filter(t => t.jobId === matchedJob.id);
          const empIds = [...new Set(jobTimeEntries.map(t => t.employeeId))];
          for (const empId of empIds) {
            const alreadyLogged = (matchedJob.wageEntries || []).some(e => e.type === 'shoot' && e.employeeId === empId && e.calendarEventId === event.id);
            if (alreadyLogged) continue;
            const emp = employees.find(e => e.id === empId);
            const empTimeEntries = jobTimeEntries.filter(t => t.employeeId === empId);
            const clockedHours = empTimeEntries.reduce((a, t) => a + (t.hoursWorked || 0), 0);
            let scheduledStart = '10:00', scheduledEnd = '22:00';
            if (event.start?.dateTime) { const s = new Date(event.start.dateTime); scheduledStart = `${String(s.getHours()).padStart(2,'0')}:${String(s.getMinutes()).padStart(2,'0')}`; }
            if (event.end?.dateTime) { const en = new Date(event.end.dateTime); scheduledEnd = `${String(en.getHours()).padStart(2,'0')}:${String(en.getMinutes()).padStart(2,'0')}`; }
            const calHours = (() => { const s = new Date(`2000-01-01T${scheduledStart}`); const en = new Date(`2000-01-01T${scheduledEnd}`); return Math.max(0, (en - s) / 3600000); })();
            const hours = clockedHours > 0 ? clockedHours : calHours;
            await logWageEntry(matchedJob, {
              id: Date.now() + empId, employeeId: empId, employeeName: emp?.name || 'Unknown',
              type: 'shoot', stageName: 'Shoot',
              amount: parseFloat((hours * SHOOT_HOURLY_RATE).toFixed(2)),
              defaultAmount: parseFloat((hours * SHOOT_HOURLY_RATE).toFixed(2)),
              scheduledStart, scheduledEnd,
              actualStart: scheduledStart, actualEnd: scheduledEnd,
              hoursWorked: parseFloat(hours.toFixed(2)),
              status: 'approved', isOverride: false, overrideReason: '',
              calendarEventId: event.id,
              submittedAt: new Date().toISOString(), approvedAt: new Date().toISOString(), approvedBy: 'calendar'
            });
            created++;
          }
        }
        alert(created > 0 ? `Imported ${created} shoot wage ${created === 1 ? 'entry' : 'entries'} from Google Calendar.` : 'No new shoot wages to import (all already logged or no matching jobs found).');
      } catch (err) {
        console.error(err);
        alert('Failed to pull from Google Calendar.');
      }
    };

    // ── Editing wages (live from pipeline) ────────────────────────────────────
    const editingWageItems = [];
    editingJobs.forEach(job => {
      if (job.hasVideo && job.stages) {
        job.stages.forEach(stage => {
          if (stage.status === 'completed' && stage.assignedTo) {
            if (!isAdmin && stage.assignedTo !== currentUser?.id) return;
            const emp = employees.find(e => e.id === stage.assignedTo);
            const amount = getStageRate(stage.name, job);
            if (amount === 0) return;
            const entry = (job.wageEntries || []).find(e => e.type === 'video_stage' && e.stageName === stage.name && e.employeeId === stage.assignedTo);
            editingWageItems.push({
              jobId: job.id, jobName: job.jobName, customerName: job.customerName, shootDate: job.shootDate,
              employeeId: stage.assignedTo, employeeName: emp?.name || 'Unknown',
              type: 'video_stage', stageName: stage.name,
              amount, status: entry?.status || 'approved', entryId: entry?.id || null,
              camCount: job.numVideographers || 2,
              completedAt: stage.completedAt || entry?.submittedAt || null,
              confirmedAt: entry?.confirmedAt || null, paidAt: entry?.paidAt || null
            });
          }
        });
      }
      if (job.hasPhotos && job.photoStatus === 'completed' && job.photoAssignedTo) {
        if (isAdmin || job.photoAssignedTo === currentUser?.id) {
          const emp = employees.find(e => e.id === job.photoAssignedTo);
          const amount = getPhotoRate(job);
          const entry = (job.wageEntries || []).find(e => e.type === 'photo' && e.employeeId === job.photoAssignedTo);
          editingWageItems.push({
            jobId: job.id, jobName: job.jobName, customerName: job.customerName, shootDate: job.shootDate,
            employeeId: job.photoAssignedTo, employeeName: emp?.name || 'Unknown',
            type: 'photo', stageName: 'Photo Editing',
            amount, status: entry?.status || 'approved', entryId: entry?.id || null,
            camCount: job.numPhotographers || 1,
            completedAt: entry?.submittedAt || null,
            confirmedAt: entry?.confirmedAt || null, paidAt: entry?.paidAt || null
          });
        }
      }
    });

    const editingOwed = editingWageItems.filter(e => e.status !== 'paid').reduce((a, e) => a + e.amount, 0);
    const editingPaid = editingWageItems.filter(e => e.status === 'paid').reduce((a, e) => a + e.amount, 0);

    const markEditingPaid = async (item) => {
      const job = editingJobs.find(j => j.id === item.jobId);
      if (!job) return;
      if (item.entryId) {
        await updateWageEntry(item.jobId, item.entryId, { status: 'paid', paidAt: new Date().toISOString() });
      } else {
        const emp = employees.find(e => e.id === item.employeeId);
        await logWageEntry(job, {
          id: Date.now(), employeeId: item.employeeId, employeeName: emp?.name || item.employeeName,
          type: item.type, stageName: item.stageName,
          amount: item.amount, defaultAmount: item.amount,
          status: 'paid', isOverride: false, overrideReason: '',
          submittedAt: new Date().toISOString(), approvedAt: new Date().toISOString(), approvedBy: currentUser.name,
          paidAt: new Date().toISOString()
        });
      }
    };

    const markEditingUnpaid = async (item) => {
      if (!item.entryId) return;
      await updateWageEntry(item.jobId, item.entryId, { status: 'approved', paidAt: null });
    };

    const payAllForEmployee = async (emp) => {
      const unpaidShoots = emp.allItems.filter(i => i._kind === 'shoot' && i.status === 'approved');
      const unpaidEdits  = emp.allItems.filter(i => i._kind === 'edit'  && i.status !== 'paid');
      const total = unpaidShoots.reduce((a, i) => a + (i.amount || 0), 0) + unpaidEdits.reduce((a, i) => a + i.amount, 0);
      if (total === 0) return;
      if (!window.confirm(`Pay all outstanding wages for ${emp.name}?\n\nTotal: £${total.toFixed(2)}\n(${unpaidShoots.length + unpaidEdits.length} entries)`)) return;
      const now = new Date().toISOString();
      for (const item of unpaidShoots) await updateWageEntry(item.jobId, item.id, { status: 'paid', paidAt: now });
      for (const item of unpaidEdits)  await markEditingPaid(item);
    };

    // Unified per-employee breakdown (shoots + editing combined)
    const allByEmployee = employees.map(emp => {
      const shoots = allShootEntries.filter(e => e.employeeId === emp.id && (showArchivedWages || !e.archived)).map(e => ({ ...e, _kind: 'shoot', _sortKey: e.submittedAt || e.approvedAt || '' }));
      const edits  = editingWageItems.filter(e => e.employeeId === emp.id && (showArchivedWages || !e.archived)).map(e => ({ ...e, _kind: 'edit',  _sortKey: e.completedAt || '' }));
      const allItems = [...shoots, ...edits].sort((a, b) => new Date(b._sortKey || 0) - new Date(a._sortKey || 0));
      const owed = shoots.filter(e => e.status === 'approved' && !e.archived).reduce((a, e) => a + (e.amount || 0), 0)
                 + edits.filter(e => e.status !== 'paid').reduce((a, e) => a + e.amount, 0);
      const paid = shoots.filter(e => e.status === 'paid').reduce((a, e) => a + (e.amount || 0), 0)
                 + edits.filter(e => e.status === 'paid').reduce((a, e) => a + e.amount, 0);
      return { ...emp, allItems, owed, paid };
    }).filter(e => e.allItems.length > 0);

    // Payment request helpers
    const savePaymentRequests = (reqs) => { setPaymentRequests(reqs); localStorage.setItem('eyecon_payment_requests', JSON.stringify(reqs)); };
    const submitPaymentRequest = () => {
      if (!paymentRequestModal) return;
      const { jobName, notes, amount } = paymentRequestModal;
      if (!jobName.trim()) { alert('Please enter the job name.'); return; }
      const emp = employees.find(e => e.id === currentUser.id) || currentUser;
      const req = { id: Date.now(), employeeId: currentUser.id, employeeName: emp?.name || currentUser.name, jobName: jobName.trim(), notes: notes || '', amount: parseFloat(amount) || 0, status: 'pending', requestedAt: new Date().toISOString() };
      savePaymentRequests([...paymentRequests, req]);
      setPaymentRequestModal(null);
      alert('Payment request sent to admin.');
    };
    const pendingPayRequests = isAdmin ? paymentRequests.filter(r => r.status === 'pending') : [];

    // Shared pay scale panel renderer
    const PayScalePanel = ({ emp }) => (
      <div className={`px-3 py-3 border-b text-xs ${dm ? 'bg-gray-900 border-gray-700' : 'bg-blue-50 border-gray-200'}`}>
        <p className={`font-semibold mb-2 uppercase tracking-wide text-xs ${dm ? 'text-gray-400' : 'text-gray-500'}`}>Pay Scale — {emp.name}</p>
        <div className="grid grid-cols-2 gap-x-6 gap-y-1.5">
          <span className={dm ? 'text-gray-400' : 'text-gray-500'}>Shoot (on-site)</span>
          <span className={`font-semibold ${dm ? 'text-white' : 'text-gray-800'}`}>£{SHOOT_HOURLY_RATE}/hr</span>
          <span className={`col-span-2 border-t mt-1 pt-1 font-medium ${dm ? 'text-gray-400 border-gray-700' : 'text-gray-500 border-gray-200'}`}>Editing (per stage)</span>

              }, 0);
              const totalEarnedEdit = paidItems.reduce((a, e) => a + e.amount, 0);
              const totalH = totalHoursShoot + totalHoursEdit;
              return totalH > 0 ? (totalEarnedShoot + totalEarnedEdit) / totalH : 0;
            })();

            const selectCls = `text-xs rounded px-2 py-1 border ${dm ? 'bg-gray-700 border-gray-600 text-white' : 'bg-white border-gray-300 text-gray-700'}`;

  // QUOTE CALCULATOR
  if (currentView === 'quote' && (currentUser?.role === 'admin' || currentUser?.role === 'manager')) {
    const BASE_POSTCODE = 'BB1 6NG';
    
    // Approximate distance calculation based on UK postcodes (simplified)
    const calculateDistanceFromPostcode = (destPostcode) => {
      if (!destPostcode) return 0;
      // Simplified UK postcode distance estimation
      // In reality, you'd use Google Maps API or similar
      const postcodeDistances = {
        'BB1': 0, 'BB': 3, 'PR': 15, 'BL': 10, 'M': 25, 'OL': 20, 'WN': 18,
        'L': 40, 'WA': 30, 'SK': 35, 'HD': 40, 'HX': 35, 'BD': 30,
        'LS': 45, 'S': 55, 'DN': 70, 'HU': 90, 'YO': 80, 'DL': 60,
        'TS': 85, 'NE': 110, 'SR': 105, 'DH': 100, 'CA': 80,
        'LA': 50, 'FY': 25, 'LE': 90, 'NG': 85, 'DE': 75, 'ST': 60,
        'WV': 70, 'B': 80, 'CV': 95, 'NN': 120, 'MK': 140, 'LU': 160,
        'AL': 170, 'WD': 175, 'EN': 180, 'N': 200, 'E': 205, 'SE': 210,
        'SW': 210, 'W': 205, 'NW': 200, 'EC': 205, 'WC': 205,
        'BR': 215, 'DA': 220, 'RM': 210, 'IG': 205, 'CM': 190,
        'SS': 200, 'CO': 180, 'IP': 170, 'NR': 180, 'PE': 140,
        'CB': 150, 'SG': 160, 'HP': 155, 'OX': 160, 'RG': 180,
        'SL': 185, 'UB': 190, 'TW': 195, 'KT': 200, 'SM': 205,
        'CR': 210, 'GU': 200, 'RH': 210, 'BN': 230, 'PO': 240,
        'SO': 220, 'SP': 200, 'BA': 190, 'BS': 170, 'GL': 140,
        'SN': 175, 'DT': 210, 'BH': 220, 'EX': 250, 'TQ': 260,
        'PL': 280, 'TR': 300, 'TA': 200, 'CF': 170, 'NP': 160,
        'SA': 180, 'LL': 80, 'SY': 100, 'LD': 110, 'HR': 130,
        'WR': 110, 'DY': 85, 'TF': 80, 'CW': 45, 'CH': 50
      };
      
      const clean = destPostcode.toUpperCase().replace(/[^A-Z]/g, '');
      const prefix = clean.substring(0, 2);
      const singlePrefix = clean.substring(0, 1);
      if (postcodeDistances[prefix] !== undefined) return postcodeDistances[prefix];
      if (postcodeDistances[singlePrefix] !== undefined) return postcodeDistances[singlePrefix];
      return 50;
    };
    
    const calculateMileageCost = (miles) => miles * 0.45 * 2;


    
    // Calculate costs (for profit calculation)
    const calculateCosts = () => {
      let costs = 0;
      quoteData.dates.forEach((day) => {
        const start = new Date(`2025-01-01T${day.startTime}`);
        const end = new Date(`2025-01-01T${day.endTime}`);
        const hours = (end - start) / (1000 * 60 * 60);
        
        // Staff costs at £13/hour
        if (quoteData.wantVideo) costs += hours * 13;
        if (quoteData.wantPhoto) costs += hours * quoteData.numPhotographers * 13;
      });
      // Add travel costs (per day)
      quoteData.dates.forEach(day => {
        const dist = day.distance || 0;
        if (dist > 0) costs += calculateMileageCost(dist);
      });
      return costs;
    };
    
    const calculateQuote = () => {
      let serviceTotal = 0;
      let travelTotal = 0;
      let breakdown = [];

      quoteData.dates.forEach((day, idx) => {
        const start = new Date(`2025-01-01T${day.startTime}`);
        const end = new Date(`2025-01-01T${day.endTime}`);
        const hours = (end - start) / (1000 * 60 * 60);

        if (quoteData.wantVideo) {
          const videoRate = quoteData.videoType === 'single' ? 125 : 150;
          const videoLabel = quoteData.videoType === 'single' ? 'Single Videographer' : 'Dual Videographer';
          const videoCost = hours * videoRate;
          serviceTotal += videoCost;
          breakdown.push({ item: `Day ${idx + 1} - Cinematography – ${videoLabel} (${hours}h × £${videoRate}/hr)`, cost: videoCost });
        }

        if (quoteData.wantPhoto) {
          const photoRate = quoteData.numPhotographers >= 2 ? 150 : 125;
          const photoCost = hours * photoRate;
          serviceTotal += photoCost;
          breakdown.push({ item: `Day ${idx + 1} - Photography (${hours}h × £${photoRate}/hr${quoteData.numPhotographers >= 2 ? ` — ${quoteData.numPhotographers} photographers` : ''})`, cost: photoCost });
        }
      });

      // Travel — kept separate so it's always included even when price override is active
      quoteData.dates.forEach((day, idx) => {
        const dist = day.distance || 0;
        if (dist > 0) {
          const mileageCost = calculateMileageCost(dist);
          travelTotal += mileageCost;
          breakdown.push({ item: `Day ${idx + 1} - Travel (${dist} miles × £0.45 × 2 return)`, cost: mileageCost });
        }
      });
      // Flat travel fee (optional manual override of mileage)
      const flatTravel = quoteData.travelFee || 0;
      if (flatTravel > 0 && travelTotal === 0) {
        travelTotal += flatTravel;
        breakdown.push({ item: 'Travel / Fuel', cost: flatTravel });
      } else if (flatTravel > 0) {
        travelTotal += flatTravel;
        breakdown.push({ item: 'Additional Travel / Fuel', cost: flatTravel });
      }

      const total = serviceTotal + travelTotal;
      return { total, serviceTotal, travelTotal, breakdown };
    };

    const quote = calculateQuote();
    const costs = calculateCosts();
    const discountAmount = quoteData.discount || 0;
    const adminAdj = quoteData.adminPriceAdjustment || 0;
    const priceOverride = quoteData.priceOverride || 0;
    // Travel is always added on top — price override only overrides the service cost
    const serviceBase = priceOverride > 0 ? priceOverride : (quote.serviceTotal - discountAmount + adminAdj);
    const finalTotal = serviceBase + quote.travelTotal;
    const discountPercent = quote.serviceTotal > 0 ? ((discountAmount / quote.serviceTotal) * 100).toFixed(1) : 0;
    const profit = finalTotal - costs;
    const profitMargin = finalTotal > 0 ? ((profit / finalTotal) * 100).toFixed(1) : 0;
    
    const quoteType = quoteData.wantPhoto && quoteData.wantVideo ? 'Photography & Cinematography' : 
                      quoteData.wantPhoto ? 'Photography' : 'Cinematography';
    
    // Generate PDF
    const generatePDF = () => {
      if (!window.jspdf) { alert('PDF library not loaded — please refresh the page and try again.'); return; }
      try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF('p', 'mm', 'a4');
      const W = 210, H = 297, cx = 105;

      const BLACK = [20,20,20], GRAY = [110,110,110], LGRAY = [235,235,235];
      const GOLD = [193,167,106], BLUE = [70,130,180];
      const LOGO = EYECON_LOGO;

      // Centre text, return width
      const ct = (text, y, o) => {
        o = o||{};
        doc.setFont(o.font||'helvetica', o.style||'normal');
        doc.setFontSize(o.size||10);
        doc.setTextColor(...(o.color||BLACK));
        const s = String(text);
        const w = doc.getTextWidth(s);
        doc.text(s, cx - w/2, y);
        return w;
      };

      // Centre + underline
      const ctu = (text, y, o) => {
        o = o||{};
        const w = ct(text, y, o);
        const x = cx - w/2;
        doc.setDrawColor(...(o.color||BLACK));
        doc.setLineWidth(0.4);
        doc.line(x, y+1.8, x+w, y+1.8);
      };

      // Centred para block, returns new y
      const cPara = (text, y, maxW, o) => {
        o = o||{};
        doc.setFont(o.font||'helvetica', o.style||'normal');
        doc.setFontSize(o.size||9.5);
        doc.setTextColor(...(o.color||BLACK));
        doc.splitTextToSize(text, maxW||150).forEach(line => {
          const w = doc.getTextWidth(line);
          doc.text(line, cx - w/2, y);
          y += o.lead||6.5;
        });
        return y;
      };

      const formatDate = ds => {
        if (!ds) return 'TBC';
        const d = new Date(ds + 'T12:00:00');
        const n = d.getDate();
        const sfx = [11,12,13].includes(n%100)?'TH':(['ST','ND','RD'][(n%10)-1]||'TH');
        return n+sfx+' '+d.toLocaleDateString('en-GB',{month:'long',year:'numeric'}).toUpperCase();
      };

      const getHrs = day => (new Date('2000-01-01T'+day.endTime) - new Date('2000-01-01T'+day.startTime))/3600000;

      // Draw logo + MOMENTS FOR LIFE centred below
      const drawLogo = yCentre => {
        const sz = 18;
        try { doc.addImage(LOGO, 'PNG', cx-sz/2, yCentre-sz/2, sz, sz); }
        catch(e) {
          doc.setDrawColor(...GOLD); doc.setLineWidth(0.7); doc.circle(cx, yCentre, 9);
          doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(...GOLD);
          const ew = doc.getTextWidth('EM'); doc.text('EM', cx-ew/2, yCentre+4);
        }
        doc.setFont('helvetica','normal'); doc.setFontSize(6); doc.setTextColor(...GRAY);
        const mfl = 'M O M E N T S   F O R   L I F E';
        const mw = doc.getTextWidth(mfl);
        doc.text(mfl, cx - mw/2, yCentre + sz/2 + 5);
      };

      // Add a new light-grey content page and return the starting y
      const addContentPage = () => {
        doc.addPage();
        doc.setFillColor(...LGRAY); doc.rect(0,0,W,H,'F');
        return 32;
      };
      // If adding `needed` mm from y would hit the logo/footer area, flush page and return new y
      const overflowCheck = (y, needed) => {
        if (y + needed > H - 45) { drawLogo(H - 20); return addContentPage(); }
        return y;
      };

      const eventLabel = 'A   Q U O T E   F O R';
      const hasPhoto = quoteData.wantPhoto, hasVideo = quoteData.wantVideo;
      const typeSpaced = hasPhoto && hasVideo
        ? 'C I N E M A T O G R A P H Y   &   P H O T O G R A P H Y   Q U O T E'
        : hasPhoto ? 'P H O T O G R A P H Y   Q U O T E'
        : 'C I N E M A T O G R A P H Y   Q U O T E';

      // Helper: render one day block centred, starting at (cx, y), returns new y
      const renderDayDetailsCentred = (day, idx, y) => {
        const h = getHrs(day);
        ctu('DAY '+(idx+1), y, {size:11, style:'bold'}); y += 10;
        [
          'DATE: '+formatDate(day.date),
          'TIME: '+day.startTime+' - '+day.endTime,
          'HOURS: '+h+' HOUR'+(h!==1?'S':'')+' COVERAGE',
          'LOCATION: '+((day.location||quoteData.location||'TBC')).toUpperCase()
        ].forEach(r => { ct(r, y, {size:10, style:'bold'}); y += 7.5; });
        return y + 10;
      };

      // Helper: render one day block in a column (left-aligned within col)
      const renderDayCol = (day, idx, colX, colW, startY) => {
        const h = getHrs(day);
        let y = startY;
        // Day heading centred within column
        doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(...BLACK);
        const lbl = 'DAY '+(idx+1);
        const lw = doc.getTextWidth(lbl);
        const lx = colX + colW/2 - lw/2;
        doc.text(lbl, lx, y);
        doc.setDrawColor(...BLACK); doc.setLineWidth(0.35);
        doc.line(lx, y+1.5, lx+lw, y+1.5);
        y += 9;
        doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(...BLACK);
        [formatDate(day.date), day.startTime+' - '+day.endTime,
         h+' HR'+(h!==1?'S':'')+' COVERAGE',
         ((day.location||quoteData.location||'TBC')).toUpperCase()
        ].forEach(r => {
          // centre each row within the column
          const rw = doc.getTextWidth(r);
          const rx = rw < colW-4 ? colX + colW/2 - rw/2 : colX+2;
          if (rw >= colW-4) {
            doc.splitTextToSize(r, colW-4).forEach(line => {
              const lw2 = doc.getTextWidth(line);
              doc.text(line, colX + colW/2 - lw2/2, y); y += 5.5;
            });
          } else {
            doc.text(r, rx, y); y += 6;
          }
        });
        return y;
      };

      // Helper: render one day pricing block centred
      const renderDayPriceCentred = (day, idx, y) => {
        const h = getHrs(day);
        ctu('DAY '+(idx+1), y, {size:11, style:'bold'}); y += 12;
        if (hasVideo)  { ct('Videography: £'+(h*150).toFixed(2), y, {size:11}); y += 8; }
        if (hasPhoto)  { const np=quoteData.numPhotographers||1; const pr=np>=2?150:125; ct('Photography: £'+(h*pr).toFixed(2), y, {size:11}); y += 8; }
        const dayDist = (day.distance !== undefined ? day.distance : quoteData.distance)||0;
        if (dayDist>0) { ct('Travel: £'+(dayDist*0.9).toFixed(2), y, {size:11}); y += 8; }
        return y + 10;
      };

      // Helper: render one day pricing block in a column
      const renderDayPriceCol = (day, idx, colX, colW, startY) => {
        const h = getHrs(day);
        let y = startY;
        doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(...BLACK);
        const lbl = 'DAY '+(idx+1);
        const lw = doc.getTextWidth(lbl);
        const lx = colX + colW/2 - lw/2;
        doc.text(lbl, lx, y);
        doc.setDrawColor(...BLACK); doc.setLineWidth(0.35);
        doc.line(lx, y+1.5, lx+lw, y+1.5);
        y += 11;
        doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...BLACK);
        const lines = [];
        if (hasVideo)  lines.push('Videography: £'+(h*150).toFixed(2));
        if (hasPhoto)  { const np=quoteData.numPhotographers||1; const pr=np>=2?150:125; lines.push('Photography: £'+(h*pr).toFixed(2)); }
        const dayDist2 = (day.distance !== undefined ? day.distance : quoteData.distance)||0;
        if (dayDist2>0) lines.push('Travel: £'+(dayDist2*0.9).toFixed(2));
        lines.forEach(r => {
          const rw = doc.getTextWidth(r);
          doc.text(r, colX + colW/2 - rw/2, y); y += 7.5;
        });
        return y;
      };

      // ══ PAGE 1: COVER ═══════════════════════════════════════════
      ct(typeSpaced, 11, {size:6.5, color:GRAY});
      ct('E Y E C O N   M O M E N T S', 18, {size:6.5, color:GRAY});
      ct(eventLabel, 148, {size:8, color:GRAY});

      doc.setFont('times','bolditalic');
      let nameSize = 44;
      doc.setFontSize(nameSize);
      const clientStr = quoteData.clientName || 'Client Name';
      while (doc.getTextWidth(clientStr) > 172 && nameSize > 20) { nameSize--; doc.setFontSize(nameSize); }
      doc.setTextColor(...BLACK);
      doc.text(clientStr, cx - doc.getTextWidth(clientStr)/2, 172);

      ct(typeSpaced, 194, {size:6.5, color:GRAY});
      drawLogo(250);

      // ══ PAGE 2: DETAILS ══════════════════════════════════════════
      doc.addPage();
      doc.setFillColor(...LGRAY); doc.rect(0,0,W,H,'F');

      let y = 32;
      ctu('EVENT DETAILS', y, {size:14, style:'bold'}); y += 22;

      const numDays = quoteData.dates.length;
      if (numDays <= 2) {
        quoteData.dates.forEach((day, i) => { y = renderDayDetailsCentred(day, i, y); });
      } else {
        // 3 days side by side
        const colW = 60, gap = 5, totalW = 3*colW + 2*gap;
        const startX = (W - totalW) / 2;
        const maxY = quoteData.dates.reduce((maxBottomY, day, i) => {
          const col = i % 3;
          const colX = startX + col*(colW+gap);
          const bottomY = renderDayCol(day, i, colX, colW, y);
          return Math.max(maxBottomY, bottomY);
        }, y);
        y = maxY + 8;
      }

      y += 8;
      ctu("WHAT'S INCLUDED", y, {size:14, style:'bold'}); y += 18;
      [
        "We offer a pre-event consultation to run through the full day plan for each day to ensure a smooth day for you and your family.",
        "The stated hours of photography and cinematography coverage for the specified times and locations.",
        "Images and videos will be returned digitally via USB.",
      ].forEach(p => { y = cPara(p, y, 152); y += 5; });

      if (hasVideo) {
        y = overflowCheck(y, 80); // heading + 5 items ≈ 75mm
        y += 6; ctu('Cinematography', y, {size:11, style:'bold'}); y += 11;
        ['1 or 2 Videographers (as appropriate)','A full-length cinematic film recorded in 4k',
         'A cinematic trailer',"A highlights reel of the day's events",'A personalised engraved memory stick'
        ].forEach(item => { ct(item, y, {size:9.5}); y += 6.5; });
      }
      if (hasPhoto) {
        y = overflowCheck(y, 55); // heading + 3 items ≈ 50mm
        y += 8; ctu('Photography', y, {size:11, style:'bold'}); y += 11;
        const np = quoteData.numPhotographers||1;
        [np+' Photographer'+(np>1?'s':''),'Unlimited photos','All photos are edited and returned digitally'
        ].forEach(item => { ct(item, y, {size:9.5}); y += 6.5; });
      }

      drawLogo(H - 20);

      // ══ PAGE 3: PRICING ══════════════════════════════════════════
      doc.addPage();
      doc.setFillColor(...LGRAY); doc.rect(0,0,W,H,'F');

      y = 32;
      ctu('YOUR BESPOKE PACKAGE', y, {size:14, style:'bold'}); y += 24;

      // Only show per-day itemised prices when no override is active —
      // otherwise the calculated line items would contradict the adjusted total
      const hasPriceOverride = (quoteData.priceOverride || 0) > 0 || (quoteData.adminPriceAdjustment || 0) !== 0 || (quoteData.discount || 0) > 0;
      if (!hasPriceOverride) {
        if (numDays <= 2) {
          quoteData.dates.forEach((day, i) => { y = renderDayPriceCentred(day, i, y); });
        } else {
          const colW = 60, gap = 5, totalW = 3*colW + 2*gap;
          const startX = (W - totalW) / 2;
          const maxY = quoteData.dates.reduce((maxBottomY, day, i) => {
            const col = i % 3;
            const colX = startX + col*(colW+gap);
            const bottomY = renderDayPriceCol(day, i, colX, colW, y);
            return Math.max(maxBottomY, bottomY);
          }, y);
          y = maxY + 12;
        }
        y += 8;
      }

      ct('YOUR PACKAGE FROM ONLY:', y, {size:13, style:'bold', color:BLUE}); y += 13;
      const svcBase = (quoteData.priceOverride||0) > 0 ? (quoteData.priceOverride||0) : (quote.serviceTotal - (quoteData.discount||0) + (quoteData.adminPriceAdjustment||0));
      const finalAmt = svcBase + quote.travelTotal;
      ct('£'+finalAmt.toFixed(2), y, {size:22, style:'bold', color:BLUE}); y += 20;

      doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...GRAY);
      const noteLines = doc.splitTextToSize(
        'PLEASE NOTE THAT ADDITIONAL HOURS WILL BE CHARGED ON A PRO-RATA BASIS WITH A PREMIUM OF 20%.', 150);
      noteLines.forEach(line => {
        const lw = doc.getTextWidth(line); const lx = cx-lw/2;
        doc.text(line, lx, y);
        doc.setDrawColor(...GRAY); doc.setLineWidth(0.2); doc.line(lx, y+1, lx+lw, y+1);
        y += 5.5;
      });
      y += 14;

      y = overflowCheck(y, 100); // payment terms + links + final text ≈ 95mm
      ct('PAYMENT TERMS', y, {size:12, style:'bold'}); y += 14;
      ct('50% deposit to secure booking', y, {size:9.5}); y += 8;
      ct('50% balance to be paid prior to the event', y, {size:9.5}); y += 10;
      y = cPara('Please secure your booking early to avoid disappointment as dates are subject to availability.', y, 150, {lead:7});
      y += 14;

      // T&C link line
      doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...GRAY);
      const tc1 = 'PLEASE REVIEW OUR '; const tc2 = 'TERMS AND CONDITIONS'; const tc3 = ' PRIOR TO LEAVING YOUR DEPOSIT';
      doc.setFontSize(7.5);
      const tc1w = doc.getTextWidth(tc1), tc2w = doc.getTextWidth(tc2), tc3w = doc.getTextWidth(tc3);
      let tx = cx - (tc1w+tc2w+tc3w)/2;
      doc.text(tc1, tx, y); tx += tc1w;
      doc.setTextColor(...BLUE);
      doc.textWithLink(tc2, tx, y, {url:'http://eyeconmoments.co.uk/terms.html'});
      doc.setDrawColor(...BLUE); doc.setLineWidth(0.2); doc.line(tx, y+1, tx+tc2w, y+1);
      tx += tc2w;
      doc.setTextColor(...GRAY);
      doc.text(tc3, tx, y);
      y += 9;

      // Google Reviews link line
      const gr1 = 'CHECK OUT OUR '; const gr2 = 'GOOGLE REVIEWS'; const gr3 = ' TO HEAR WHAT OUR CUSTOMERS THINK!';
      const gr1w = doc.getTextWidth(gr1), gr2w = doc.getTextWidth(gr2), gr3w = doc.getTextWidth(gr3);
      let gx = cx - (gr1w+gr2w+gr3w)/2;
      doc.setTextColor(...GRAY);
      doc.text(gr1, gx, y); gx += gr1w;
      doc.setTextColor(...BLUE);
      doc.textWithLink(gr2, gx, y, {url:'https://www.google.com/search?q=eyecon+moments'});
      doc.setDrawColor(...BLUE); doc.setLineWidth(0.2); doc.line(gx, y+1, gx+gr2w, y+1);
      gx += gr2w;
      doc.setTextColor(...GRAY);
      doc.text(gr3, gx, y);
      y += 14;

      ct('WE LOOK FORWARD TO HEARING FROM YOU AND WELCOME ANY QUESTIONS', y, {size:9.5, style:'bold'});

      drawLogo(H - 20);

      const safe = (quoteData.clientName||'Client').replace(/[^a-zA-Z0-9 &]/g,'').replace(/ /g,'_');
      const svc  = hasPhoto && hasVideo ? 'Photo_Video' : hasPhoto ? 'Photography' : 'Cinematography';
      const pdfFilename = (quoteData.numDays||1)+'_DAY_EM_'+svc+'_Quote_'+safe+'.pdf';
      try {
        doc.save(pdfFilename);
      } catch(saveErr) {
        // Fallback: create blob URL and trigger anchor click
        const blob = doc.output('blob');
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = pdfFilename; a.click();
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      }
      } catch(e) { console.error('PDF generation error:', e); alert('Failed to generate PDF: ' + e.message + '\n\nCheck the browser console for details.'); }
    };

    // Email Quote - Opens Gmail compose + saves to CRM
    const emailQuote = async () => {
      const firstName = (quoteData.clientName || '').split(' ')[0].split('&')[0].trim() || 'there';
      const subjectText = `${quoteType} Quote - Eyecon Moments`;
      const bodyText = `Hello ${firstName},\n\nHope you are well.\n\nI have attached the quote for your attention with a breakdown of the details for you to consider.\n\nIf you have any questions or would like to further discuss anything, please don't hesitate to contact. I look forward to hearing from you.\n\nKind Regards,\nEyecon Moments`;
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      if (isMobile) {
        // On mobile, mailto: triggers the native mail app
        const gmailUrl = `mailto:${encodeURIComponent(quoteData.clientEmail)}?subject=${encodeURIComponent(subjectText)}&body=${encodeURIComponent(bodyText)}`;
        window.location.href = gmailUrl;
      } else {
        // On desktop, open Gmail web compose in a new tab
        const gmailWebUrl = `https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(quoteData.clientEmail)}&su=${encodeURIComponent(subjectText)}&body=${encodeURIComponent(bodyText)}`;
        window.open(gmailWebUrl, '_blank');
      }

      // Save to CRM
      try {
        const followUpDate = new Date();
        followUpDate.setDate(followUpDate.getDate() + 7);
        const dayCount = quoteData.dates.length;
        const qNotes = `[Quote sent ${new Date().toLocaleDateString('en-GB')}] £${finalTotal.toFixed(2)} — ${quoteType}, ${dayCount} day${dayCount > 1 ? 's' : ''}. Follow up by ${followUpDate.toLocaleDateString('en-GB')}.`;
        const existing = inquiries.find(i => i.email?.toLowerCase() === quoteData.clientEmail.toLowerCase());
        if (existing) {
          const updatedNotes = existing.notes ? existing.notes + '\n' + qNotes : qNotes;
          await db.from('inquiries').update({
            status: 'quoted',
            quoted_date: new Date().toISOString(),
            follow_up_date: followUpDate.toISOString(),
            notes: updatedNotes
          }).eq('id', existing.id);
          setInquiries(prev => prev.map(i => i.id === existing.id ? {
            ...i, status: 'quoted', followUpDate, notes: updatedNotes
          } : i));
          alert('Gmail opened — remember to attach the PDF!\n\nExisting CRM record updated to "Quoted" with a 7-day follow-up reminder.');
        } else {
          const { data, error } = await db.from('inquiries').insert([{
            id: Date.now(),
            customer_name: quoteData.clientName,
            email: quoteData.clientEmail,
            phone: quoteData.clientPhone || '',
            event_type: quoteData.eventType,
            event_date: quoteData.dates[0]?.date || null,
            status: 'quoted',
            notes: qNotes,
            submitted_date: new Date().toISOString(),
            quoted_date: new Date().toISOString(),
            follow_up_date: followUpDate.toISOString()
          }]).select().single();
          if (!error && data) {
            setInquiries(prev => [rowToInquiry(data), ...prev]);
            alert('Gmail opened — remember to attach the PDF!\n\nNew CRM lead created as "Quoted" with a 7-day follow-up reminder.');
          } else {
            alert('Gmail opened — remember to attach the PDF!\n\n(CRM save failed: ' + (error?.message || 'unknown error') + ')');
          }
        }
      } catch(e) {
        alert('Gmail opened — remember to attach the PDF!\n\n(CRM save error: ' + e.message + ')');
      }
    };

    // Park / save / load quotes
    const parkQuote = () => {
      if (!quoteData.clientName && !quoteData.clientEmail) { alert('Please fill in at least a client name or email before parking.'); return; }
      const label = (quoteData.clientName || quoteData.clientEmail || 'Unnamed') + ' — ' + new Date().toLocaleDateString('en-GB');
      const newSaved = [...savedQuotes, { id: Date.now(), name: label, savedAt: new Date().toISOString(), data: { ...quoteData } }];
      setSavedQuotes(newSaved);
      localStorage.setItem('eyecon_parked_quotes', JSON.stringify(newSaved));
      alert(`Quote parked as "${label}"\n\nYou can reload it from the Parked Quotes section at the top of this page.`);
    };
    const loadParkedQuote = (sq) => {
      if (window.confirm(`Load "${sq.name}"?\n\nThis will overwrite the current form.`)) {
        setQuoteData(sq.data);
      }
    };
    const deleteParkedQuote = (id) => {
      const updated = savedQuotes.filter(sq => sq.id !== id);
      setSavedQuotes(updated);
      localStorage.setItem('eyecon_parked_quotes', JSON.stringify(updated));
    };
    
    return (
      <div className={`min-h-screen ${darkMode ? 'bg-gray-900' : 'bg-gray-50'}`}>
        {helpModalJSX}
        {NavBar()}
        <div className="p-4 space-y-4">

          {/* Parked Quotes */}
          {savedQuotes.length > 0 && (
            <div className={`${darkMode ? 'bg-gray-800 border-yellow-600' : 'bg-yellow-50 border-yellow-300'} rounded-lg shadow p-4 border`}>
              <h3 className={`font-bold text-sm mb-3 ${darkMode ? 'text-yellow-300' : 'text-yellow-800'}`}>💾 Parked Quotes ({savedQuotes.length})</h3>
              <div className="space-y-2">
                {savedQuotes.map(sq => (
                  <div key={sq.id} className={`flex items-center justify-between p-2 rounded ${darkMode ? 'bg-gray-700' : 'bg-white border border-yellow-200'}`}>
                    <span className={`text-sm flex-1 ${darkMode ? 'text-gray-200' : 'text-gray-700'}`}>{sq.name}</span>
                    <div className="flex gap-2 ml-3">
                      <button onClick={() => loadParkedQuote(sq)}
                        className="px-3 py-1 text-xs bg-blue-500 text-white rounded hover:bg-blue-600 font-medium">Load</button>
                      <button onClick={() => deleteParkedQuote(sq.id)}
                        className="px-3 py-1 text-xs bg-red-500 text-white rounded hover:bg-red-600 font-medium">Delete</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-lg shadow p-4`}>
            <div className="flex justify-between items-center mb-4">
              <h2 className={`text-xl font-bold ${darkMode ? 'text-white' : 'text-gray-800'}`}>💰 {quoteType} Quote Calculator</h2>
              <button onClick={() => { if (window.confirm('Clear current quote and start fresh?')) { const blank = { clientName:'',clientEmail:'',clientPhone:'',eventType:'wedding',numDays:1,dates:[{date:'',startTime:'10:00',endTime:'22:00',location:'',postcode:'',distance:0}],wantPhoto:true,wantVideo:true,numPhotographers:1,numVideographers:1,videoType:'dual',location:'',postcode:'',distance:0,travelFee:0,notes:'',discount:0,adminPriceAdjustment:0,priceOverride:0 }; setQuoteData(blank); localStorage.removeItem('eyecon_quote_draft'); } }}
                className={`text-xs px-3 py-1 rounded-lg ${darkMode ? 'bg-gray-600 text-gray-300 hover:bg-gray-500' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                🗑 New Quote
              </button>
            </div>

            {/* Client Details */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
              <div>
                <label className={`block text-sm font-medium mb-1 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>Client Name *</label>
                <input type="text" value={quoteData.clientName} onChange={(e) => setQuoteData({...quoteData, clientName: e.target.value})}
                  className="w-full px-3 py-2 border rounded-lg" placeholder="e.g. Sarah & Ahmed" />
              </div>
              <div>
                <label className={`block text-sm font-medium mb-1 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>Client Email *</label>

  // BACKUP SYSTEM VIEW (in settings or employees)
  const generateBackup = () => {
    const backup = {
      timestamp: new Date().toISOString(),
      employees: employees,
      editingJobs: editingJobs,
      timeEntries: timeEntries,
      inquiries: inquiries,
      archivedJobIds: archivedJobIds,
      fileChangeHistory: fileChangeHistory,
      emergencyContactHistory: emergencyContactHistory,
      looseThreads: looseThreads
    };
    return JSON.stringify(backup, null, 2);
  };
  
  const downloadBackup = () => {
    const backup = generateBackup();
    const blob = new Blob([backup], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `eyecon_backup_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };
  
  const handleRestoreBackup = (event) => {
    const file = event.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const backup = JSON.parse(e.target.result);
          if (backup.employees) setEmployees(backup.employees);
          if (backup.editingJobs) setEditingJobs(backup.editingJobs);
          if (backup.looseThreads) setLooseThreads(backup.looseThreads);
          if (backup.timeEntries) setTimeEntries(backup.timeEntries);
          if (backup.inquiries) setInquiries(backup.inquiries);
          if (backup.archivedJobIds) setArchivedJobIds(backup.archivedJobIds);
          alert('Backup restored successfully!');
        } catch (err) {
          alert('Error restoring backup: Invalid file format');
        }
      };
      reader.readAsText(file);
    }
  };
