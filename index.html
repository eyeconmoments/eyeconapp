  // Compress image to max 1024px and JPEG quality 0.7 before sending to AI edge function
  const compressImageForAI = (dataUrl, maxSize = 1024, quality = 0.75) => new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });

  const getOrCreateDriveFolder = async (folderName, token) => {
    const safeName = folderName.replace(/[/\\?%*:|"<>]/g, '-');
    const q = `name='${safeName.replace(/'/g, "\\'")}' and mimeType='application/vnd.google-apps.folder' and trashed=false`;
    const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id)`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    if (data.files && data.files.length > 0) return data.files[0].id;
    const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: safeName, mimeType: 'application/vnd.google-apps.folder' })
    });
    const folder = await createRes.json();
    if (!folder.id) throw new Error('Could not create Drive folder: ' + (folder.error?.message || 'unknown error'));
    return folder.id;
  };

      const folderName = `Eyecon — ${job.jobName}`;
      const folderId = await getOrCreateDriveFolder(folderName, token);

      const meta = { name: file.name, parents: [folderId] };
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
      form.append('file', file);

        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
        body: form
      });
      if (!uploadRes.ok) {

      const onStart = (e) => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        isDragging = false;
      };
      const onMove = (e) => {
        const dx = Math.abs(e.touches[0].clientX - startX);

        }
        if (isDragging) {

        }
      };
      el.addEventListener('touchstart', onStart, { passive: true });
      el.addEventListener('touchmove', onMove, { passive: false });

VIDEO EDITING GUIDE (Eyecon Moments standard procedure):

STAGES:
1. Organising and cutting
2. Adding music
3. Colouring, stabilising and finalising
4. Intros, trailers and highlights
5. Final watch on memory stick

SECTIONS OF A FILM (most weddings):
- Home: start with building/house shot
- Venue: start with name signs
- Mingling: no two close shots simultaneously
- Gate: bride shots (slow mo + synced), groom shots (slow mo + synced)
- Entrances: slow mo + synced
- Couple shots: slow mo
- Food: no two close shots simultaneously
- Stage: 8 seconds straight, 4 seconds sides (slow mo)
- Cake: synced
- Rings: synced — put close shots at the end
- Dance: synced
- Ruksati: slow mo + synced

CREATING A PREMIERE PRO FILE:
- Open Adobe Premiere Pro → click "New Project" (top left)
- Name: couple's names + editor's name e.g. "Mary and Bob by Faizan"
- Save location: inside the folder with the clips

ADDING CLIPS:
- Select all clips from folder → drag to bottom-left "import media" box
- Premiere will create peak files (slows PC until done)
- MUST set timeline to 24FPS: Sequence → Sequence Settings → set timebase to 24fps

ORDERING CLIPS:
- Hover over "frame rate" column → right click → Metadata Display
- In popup dropdown select "eyecon" → press OK
- Click "creation date" column to sort clips in time order
- Select all → drag to timeline. If order is wrong, delete timeline contents and repeat.

ORGANISING THE FILM:
- Section the film into parts (Home, Venue, Gate, etc.)
- Move each section into colour-coded blocks on the timeline

SLOW MOTION:
- Select the clip/section → press Ctrl+R
- Type "40" in the dialogue box
- Press "Ripple edit, shifting trailing clips" → OK

SYNCING:
- Place main clip at bottom of timeline
- Source secondary clip → move up a level, audio down a level
- Select both clips (4 tracks including audio) → right click → Synchronise
- Ensure audio radio button is selected → OK

CUTTING THE FILM:
- Cut out unusable parts. NOTHING is removed permanently — every shot is purposeful.
- Don't forget bloopers/BTS
- Stage shots: 8 and 3 seconds
- Tie up the rest

CHECKING YOUR WORK:
- Review the entire cut for cleanliness before passing on
- Sloppy cuts will be returned to the editor

SAVING:
- Save with same naming convention + "Stage 1" at the end e.g. "Mary and Bob by Faizan Stage 1"
- Email the file to the Eyecon Moments email with a one-liner for the Stage 2 editor

LOGGING:
- Use the logging doc to record when work was completed and where the file can be found.`;

          const itinHasEnded = (j) => {
            if (!j.shootDate) return false;
            const end = new Date(j.shootDate);
            const [eh, em] = (j.itinerary?.endTime || '23:59').split(':').map(Number);
            end.setHours(eh, em, 0, 0);
            return end < new Date();

          const sharedJobs = editingJobs.filter(j => {
            if (archivedJobIds.includes(j.id) || !j.itinerary) return false;

          }).sort((a, b) => new Date(a.shootDate) - new Date(b.shootDate));

          // Park/save a snapshot of an itinerary to localStorage
          const parkItin = (job) => {
            const itin = job.itinerary || {};
            const label = job.jobName + ' — ' + (job.shootDate ? new Date(job.shootDate).toLocaleDateString('en-GB') : 'TBC');
            const snap = { id: Date.now(), label, savedAt: new Date().toISOString(), job: { jobName: job.jobName, shootDate: job.shootDate, itinerary: itin } };
            const updated = [snap, ...parkedItineraries].slice(0, 20); // keep last 20
            setParkedItineraries(updated);
            localStorage.setItem('eyecon_parked_itins', JSON.stringify(updated));
            alert('💾 Itinerary saved! Find it in "Saved Itineraries" below.');
          };
          const deleteParkedItin = (id) => {
            const updated = parkedItineraries.filter(p => p.id !== id);
            setParkedItineraries(updated);
            localStorage.setItem('eyecon_parked_itins', JSON.stringify(updated));
          };

          // Compute times cumulatively — duration units are × 15 min (matches admin builder)
          const toMins = (t) => { if (!t) return 0; const [h,m] = t.split(':').map(Number); return h*60+(m||0); };
          const computeTimes = (scheduleItems, startTime) => {
            let cum = toMins(startTime || '10:00');
            const result = [];
            let i = 0;
            while (i < scheduleItems.length) {
              const item = scheduleItems[i];
              const gid = item.groupId;
              if (gid) {
                // Collect consecutive items sharing this groupId (concurrent — advance time once)
                const group = [];
                let j = i;
                while (j < scheduleItems.length && scheduleItems[j].groupId === gid) { group.push(scheduleItems[j]); j++; }
                const groupMins = cum;
                const maxDur = Math.max(...group.map(g => g.duration || 2));
                const hh = Math.floor(groupMins / 60) % 24;
                const mm = groupMins % 60;
                const computedTime = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
                group.forEach(g => result.push({ ...g, computedTime }));
                cum += maxDur * 15;
                i = j;
              } else {
                const itemMins = item.time ? toMins(item.time) : cum;
                if (!item.time) cum += (item.duration || 2) * 15;
                else cum = itemMins + (item.duration || 2) * 15;
                const hh = Math.floor(itemMins / 60) % 24;
                const mm = itemMins % 60;
                result.push({ ...item, computedTime: `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}` });
                i++;
              }
            }
            return result;
          };

          // Category colour dot
          const catColour = (label='') => {
            const l = label.toLowerCase();
            if (l.includes('bride') || l.includes('bridal')) return 'bg-pink-500';
            if (l.includes('groom')) return 'bg-blue-500';
            if (l.includes('ceremony') || l.includes('nikah')) return 'bg-purple-500';
            if (l.includes('food') || l.includes('dinner') || l.includes('meal')) return 'bg-orange-500';
            if (l.includes('stage') || l.includes('entrance')) return 'bg-red-500';
            if (l.includes('cake') || l.includes('ring')) return 'bg-yellow-500';
            if (l.includes('start') || l.includes('arrival')) return 'bg-green-500';
            if (l.includes('end') || l.includes('depart')) return 'bg-gray-500';
            return 'bg-indigo-500';
          };

          const renderItinCard = (job, itin, keyPrefix='live') => {
            const scheduleItems = itin.scheduleItems || [];

            const isCollapsed = collapsedItineraries.has(keyPrefix + job.jobName);

            const shootDate = job.shootDate ? new Date(job.shootDate) : null;
            if (shootDate) shootDate.setHours(0,0,0,0);
            const daysUntil = shootDate ? Math.ceil((shootDate - new Date().setHours(0,0,0,0)) / 86400000) : null;

                {/* Header */}
                <div className={`text-white ${isToday ? 'bg-red-500' : isTomorrow ? 'bg-orange-500' : ''}`}
                  style={(!isToday && !isTomorrow) ? {background:'linear-gradient(135deg,#1a2535 0%,#243040 60%,#1a2535 100%)', borderBottom:'1px solid rgba(193,167,106,0.3)'} : {}}>

                      </p>
                      <h4 className="font-bold text-base leading-tight truncate" style={{fontFamily:'Cormorant Garamond, serif'}}>{job.jobName}</h4>
                      <p className="text-xs mt-0.5 opacity-75">
                        {shootDate ? shootDate.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'}) : 'Date TBC'}
                        {itin.startTime && ` · ${itin.startTime}`}{itin.endTime && ` — ${itin.endTime}`}
                      </p>
                    </div>
                    <div className="flex flex-col items-end gap-1.5 ml-3 shrink-0">
                      {daysUntil !== null && <span className="text-2xl font-bold">{isToday ? 'TODAY' : isTomorrow ? 'TMR' : `${daysUntil}d`}</span>}
                      <div className="flex gap-1">
                        {keyPrefix === 'live' && (
                          <button onClick={(e) => { e.stopPropagation(); parkItin(job); }}
                            className="text-xs bg-white bg-opacity-20 hover:bg-opacity-30 px-2 py-0.5 rounded font-medium">💾 Save</button>
                        )}
                        <button onClick={toggleCollapse}
                          className="text-xs bg-white bg-opacity-20 hover:bg-opacity-30 px-2 py-0.5 rounded font-medium">
                          {isCollapsed ? '▼ Show' : '▲ Hide'}
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
                {/* Body */}
                {!isCollapsed && (
                  <div className={darkMode ? 'bg-gray-800' : 'bg-white'}>
                    {itin.nextOfKin?.name && (
                      <div className={`px-4 py-2 text-xs flex items-center gap-2 border-b ${darkMode ? 'bg-gray-700 border-gray-600 text-gray-300' : 'bg-amber-50 border-amber-100 text-gray-600'}`}>
                        <span>👤</span><span><strong>Next of Kin:</strong> {itin.nextOfKin.name}{itin.nextOfKin.phone ? ` · ${itin.nextOfKin.phone}` : ''}</span>
                      </div>
                    )}
                    {itemsWithTime.length === 0
                      ? <p className={`px-4 py-4 text-sm text-center ${darkMode ? 'text-gray-400' : 'text-gray-400'}`}>No schedule items added yet.</p>
                      : <div className={`divide-y ${darkMode ? 'divide-gray-700' : 'divide-gray-100'}`}>
                          {itemsWithTime.map((item, idx) => (
                            <div key={idx} className={`px-4 py-3 flex items-center gap-3 ${darkMode ? 'hover:bg-gray-700' : 'hover:bg-gray-50'} transition-colors`}>
                              <span className={`w-2.5 h-2.5 rounded-full shrink-0 ${catColour(item.label || item.name || '')}`}></span>
                              <span className="text-xs font-mono font-bold shrink-0 w-11" style={{color:'var(--gold)'}}>{item.computedTime}</span>
                              <div className="flex-1 min-w-0">
                                <p className={`text-sm font-semibold ${darkMode ? 'text-white' : 'text-gray-800'}`}>{item.label || item.name || 'Item'}</p>
                                {item.notes && <p className={`text-xs mt-0.5 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>{item.notes}</p>}
                              </div>
                              {item.duration && <span className={`text-xs shrink-0 px-1.5 py-0.5 rounded ${darkMode ? 'bg-gray-700 text-gray-400' : 'bg-gray-100 text-gray-500'}`}>{item.duration * 15}min</span>}
                            </div>
                          ))}
                        </div>
                    }
                  </div>
                )}
              </div>
            );
          };

          if (sharedJobs.length === 0 && parkedItineraries.length === 0) return null;
          return (
            <div className="px-4 pb-4 space-y-3">
              {/* Section heading */}
              <div className="flex items-center justify-between px-1">
                <div className="flex items-center gap-2">
                  <h3 className={`font-bold text-sm ${darkMode ? 'text-white' : 'text-gray-800'}`}>📋 My Itineraries</h3>
                  {sharedJobs.length > 0 && <span className="text-xs px-2 py-0.5 rounded-full font-bold text-white" style={{background:'var(--gold)'}}>{sharedJobs.length}</span>}
                </div>
                {parkedItineraries.length > 0 && (
                  <button onClick={() => setShowParkedItins(p => !p)}
                    className={`text-xs px-2 py-1 rounded font-medium ${darkMode ? 'bg-gray-700 text-gray-300' : 'bg-gray-100 text-gray-600'}`}>
                    💾 Saved ({parkedItineraries.length}) {showParkedItins ? '▲' : '▼'}
                  </button>
                )}
              </div>

              {/* Live shared itineraries */}
              {sharedJobs.map(job => renderItinCard(job, job.itinerary || {}, 'live'))}

              {/* Parked / saved itineraries */}
              {showParkedItins && parkedItineraries.length > 0 && (
                <div className="space-y-2">
                  <p className={`text-xs px-1 font-semibold ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>💾 Saved snapshots</p>
                  {parkedItineraries.map(p => (
                    <div key={p.id} className="relative">
                      {renderItinCard(p.job, p.job.itinerary || {}, 'parked')}
                      <div className={`flex justify-between items-center px-3 py-1.5 text-xs border-t ${darkMode ? 'bg-gray-800 border-gray-700 text-gray-500' : 'bg-gray-50 border-gray-100 text-gray-400'}`}>
                        <span>Saved {new Date(p.savedAt).toLocaleDateString('en-GB', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</span>
                        <button onClick={() => deleteParkedItin(p.id)} className="text-red-400 hover:text-red-600 font-semibold">🗑️ Remove</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })()}

        {/* Availability View for Staff */}
        {currentView === 'availability' && (() => {
          const calMonth = availCalMonth;
          const calYear = availCalYear;
          const firstDay = new Date(calYear, calMonth, 1).getDay();
          const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
          const monthName = new Date(calYear, calMonth).toLocaleString('en-GB', { month: 'long', year: 'numeric' });
          const today2 = new Date();
          const approvedRequests = availabilityRequests.filter(r => r.status === 'approved');
          const myRequests = availabilityRequests.filter(r => r.employeeId === currentUser.id);
          const getOffStaffForDay = (day) => {
            const date = new Date(calYear, calMonth, day);
            const dateStr = date.toISOString().split('T')[0];
            return approvedRequests.filter(r => dateStr >= r.startDate && dateStr <= r.endDate).map(r => r.employeeName);
          };
          const empColors = ['bg-blue-500','bg-purple-500','bg-green-500','bg-orange-500','bg-pink-500','bg-teal-500'];
          const empColorMap = {};
          employees.forEach((e, i) => { empColorMap[e.name] = empColors[i % empColors.length]; });
          return (
            <div className="p-4 space-y-4">
              {/* Calendar card */}
              <div className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-lg shadow p-4`}>
                <div className="flex justify-between items-center mb-4">
                  <h3 className={`font-bold ${darkMode ? 'text-white' : 'text-gray-800'}`}>📅 Team Availability</h3>
                  <button onClick={() => setShowAvailabilityModal(true)}
                    className="px-3 py-1.5 rounded-lg text-sm font-semibold text-white" style={{background:'var(--gold)'}}>
                    + Request Day Off
                  </button>
                </div>
                {/* Month navigation */}
                <div className="flex items-center justify-between mb-3">
                  <button onClick={() => { if (calMonth === 0) { setAvailCalMonth(11); setAvailCalYear(y => y-1); } else setAvailCalMonth(m => m-1); }}
                    className={`px-2 py-1 rounded text-sm ${darkMode ? 'text-gray-300 hover:bg-gray-700' : 'text-gray-600 hover:bg-gray-100'}`}>‹</button>
                  <span className={`font-semibold text-sm ${darkMode ? 'text-white' : ''}`}>{monthName}</span>
                  <button onClick={() => { if (calMonth === 11) { setAvailCalMonth(0); setAvailCalYear(y => y+1); } else setAvailCalMonth(m => m+1); }}
                    className={`px-2 py-1 rounded text-sm ${darkMode ? 'text-gray-300 hover:bg-gray-700' : 'text-gray-600 hover:bg-gray-100'}`}>›</button>
                </div>
                {/* Day headers */}
                <div className="grid grid-cols-7 gap-1 mb-1">
                  {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d => (
                    <div key={d} className={`text-center text-xs font-semibold py-1 ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>{d}</div>
                  ))}
                </div>
                {/* Day cells */}
                <div className="grid grid-cols-7 gap-1">
                  {Array.from({length: firstDay}).map((_, i) => <div key={`e${i}`} />)}
                  {Array.from({length: daysInMonth}).map((_, i) => {
                    const day = i + 1;
                    const offStaff = getOffStaffForDay(day);
                    const isToday = day === today2.getDate() && calMonth === today2.getMonth() && calYear === today2.getFullYear();
                    return (
                      <div key={day} className={`rounded p-1 min-h-[36px] ${isToday ? 'ring-2 ring-yellow-400' : ''} ${darkMode ? 'bg-gray-700' : 'bg-gray-50'}`}>
                        <p className={`text-xs text-center font-medium ${isToday ? 'text-yellow-400' : darkMode ? 'text-gray-300' : 'text-gray-600'}`}>{day}</p>
                        {offStaff.map((name, ni) => (
                          <div key={ni} className={`text-white rounded px-0.5 mt-0.5 truncate ${empColorMap[name] || 'bg-gray-500'}`} style={{fontSize:'9px'}}>{name.split(' ')[0]}</div>
                        ))}
                      </div>
                    );
                  })}
                </div>
                {/* Legend */}
                <div className="flex flex-wrap gap-2 mt-3 pt-3 border-t border-gray-200">
                  {employees.map((emp) => (
                    <div key={emp.id} className="flex items-center gap-1">
                      <div className={`w-2.5 h-2.5 rounded-full ${empColorMap[emp.name] || 'bg-gray-500'}`} />
                      <span className={`text-xs ${darkMode ? 'text-gray-400' : 'text-gray-600'}`}>{emp.name.split(' ')[0]}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* My requests */}
              <div className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-lg shadow p-4`}>
                <h3 className={`font-bold mb-3 ${darkMode ? 'text-white' : 'text-gray-800'}`}>My Time-Off Requests</h3>
                {myRequests.length === 0
                  ? <p className={`text-sm ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>No requests submitted yet. Use the button above to request time off.</p>
                  : <div className="space-y-2">
                      {myRequests.map(req => (
                        <div key={req.id} className={`flex items-center justify-between p-3 rounded-lg ${darkMode ? 'bg-gray-700' : 'bg-gray-50'}`}>
                          <div>
                            <p className={`text-sm font-semibold ${darkMode ? 'text-white' : 'text-gray-800'}`}>
                              {req.startDate}{req.endDate !== req.startDate ? ` → ${req.endDate}` : ''}
                            </p>
                            {req.reason && <p className={`text-xs ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>{req.reason}</p>}
                          </div>
                          <span className={`text-xs px-2 py-0.5 rounded-full font-semibold ${req.status === 'approved' ? 'bg-green-500 text-white' : req.status === 'declined' ? 'bg-red-500 text-white' : 'bg-yellow-400 text-yellow-900'}`}>
                            {req.status}
                          </span>
                        </div>
                      ))}
                    </div>
                }
              </div>
            </div>
          );
        })()}

        {/* Request Day Off Modal — available in employee availability view */}
        {showAvailabilityModal && (
          <div className="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4">
            <div className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-xl shadow-xl w-full max-w-sm`}>
              <div className={`p-4 border-b ${darkMode ? 'border-gray-700' : ''}`}>
                <h3 className={`font-bold text-lg ${darkMode ? 'text-white' : ''}`}>📅 Request Time Off</h3>
              </div>
              <div className="p-4 space-y-3">
                <div>
                  <label className={`block text-sm font-medium mb-1 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>From Date *</label>
                  <input type="date" value={availForm.startDate} onChange={e => setAvailForm(p => ({...p, startDate: e.target.value}))}
                    className={`w-full px-3 py-2 border rounded-lg ${darkMode ? 'bg-gray-700 border-gray-600 text-white' : ''}`} />
                </div>
                <div>
                  <label className={`block text-sm font-medium mb-1 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>To Date (leave blank for single day)</label>
                  <input type="date" value={availForm.endDate} onChange={e => setAvailForm(p => ({...p, endDate: e.target.value}))}
                    className={`w-full px-3 py-2 border rounded-lg ${darkMode ? 'bg-gray-700 border-gray-600 text-white' : ''}`} />
                </div>
                <div>
                  <label className={`block text-sm font-medium mb-1 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>Reason (optional)</label>
                  <input type="text" placeholder="e.g. Holiday, appointment..." value={availForm.reason}
                    onChange={e => setAvailForm(p => ({...p, reason: e.target.value}))}
                    className={`w-full px-3 py-2 border rounded-lg ${darkMode ? 'bg-gray-700 border-gray-600 text-white' : ''}`} />
                </div>
                <div className="grid grid-cols-2 gap-3 pt-1">
                  <button onClick={() => setShowAvailabilityModal(false)}
                    className={`py-2 rounded-lg font-semibold ${darkMode ? 'bg-gray-700 text-white' : 'bg-gray-100 text-gray-700'}`}>Cancel</button>
                  <button onClick={submitAvailabilityRequest} disabled={!availForm.startDate}
                    className={`py-2 rounded-lg font-semibold text-white ${availForm.startDate ? '' : 'opacity-50 cursor-not-allowed'}`} style={{background:'var(--gold)'}}>
                    Submit Request
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Files View for Employees — same card UI as admin */}
        {currentView === 'files' && (() => {
          const empAllFileLocations = editingJobs.flatMap(job =>
            (job.fileLocations || []).map((loc, locIdx) => ({
              ...loc,
              jobId: job.id,
              jobName: job.jobName,
              customerName: job.customerName,
              isArchived: archivedJobIds.includes(job.id),
              originalIndex: locIdx
            }))
          );
          const empFiltered = empAllFileLocations.filter(loc => {
            if (!fileSearchQuery) return true;
            const q = fileSearchQuery.toLowerCase();
            return loc.jobName.toLowerCase().includes(q) ||
                   loc.customerName.toLowerCase().includes(q) ||
                   (loc.path && loc.path.toLowerCase().includes(q)) ||
                   (loc.notes && loc.notes.toLowerCase().includes(q)) ||
                   (loc.drive && loc.drive.toLowerCase().includes(q));
          });
          const getHardwareColor = (hw) => {
            const colors = {
              'pc1':   { badge: 'bg-blue-500' },
              'pc2':   { badge: 'bg-purple-500' },
              'pc6':   { badge: 'bg-green-500' },
              'laptop':{ badge: 'bg-orange-500' }
            };
            return colors[hw] || { badge: 'bg-gray-500' };
          };
          return (
            <div className="p-4 space-y-4">
              {/* Search bar */}
              <div className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-lg shadow p-4`}>
                <input
                  type="text"
                  value={fileSearchQuery}
                  onChange={e => setFileSearchQuery(e.target.value)}
                  placeholder="Search by job name, customer, drive, or path..."
                  className={`w-full px-4 py-2 border rounded-lg ${darkMode ? 'bg-gray-700 border-gray-600 text-white placeholder-gray-500' : ''}`}
                />
                <p className={`text-xs mt-2 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>
                  {empFiltered.length} file location{empFiltered.length !== 1 ? 's' : ''} found
                </p>
              </div>

              {/* Cards */}
              <div className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-lg shadow p-4`}>
                <h3 className={`font-bold mb-4 ${darkMode ? 'text-white' : 'text-gray-800'}`}>📁 File Locations</h3>
                {empFiltered.length === 0 ? (
                  <p className={`text-center py-8 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>
                    {fileSearchQuery ? 'No matching file locations found' : 'No file locations saved yet'}
                  </p>
                ) : (
                  <div className="space-y-3">
                    {empFiltered.map((loc, idx) => {
                      const locationIndex = loc.originalIndex;
                      const hwColor = getHardwareColor(loc.hardware);
                      const hwName = hardwareLocations.find(h => h.id === loc.hardware)?.name || null;
                      return (
                        <div key={`${loc.jobId}-${locationIndex}`} className={`flex items-stretch rounded-xl overflow-hidden border shadow-sm ${darkMode ? 'border-gray-700' : 'border-gray-200'}`}>
                          {/* Colour strip */}
                          <div className={`w-1.5 flex-shrink-0 ${hwColor.badge}`}></div>

                          {/* Main content */}
                          <div className={`flex-1 p-3 ${darkMode ? 'bg-gray-800' : 'bg-white'}`}>
                            {/* Badges */}
                            <div className="flex items-center gap-2 flex-wrap mb-1.5">
                              {loc.hardware && hwName && (
                                <span className={`text-xs font-bold px-2 py-0.5 rounded-full text-white ${hwColor.badge}`}>{hwName}</span>
                              )}
                              {loc.drive && (
                                <span className={`text-xs font-bold px-2 py-0.5 rounded-full text-white ${hwColor.badge}`}>{loc.drive}</span>
                              )}
                              {loc.locked && (
                                <span className={`text-xs px-2 py-0.5 rounded-full ${darkMode ? 'bg-gray-700 text-gray-400' : 'bg-gray-100 text-gray-500'}`}>🔒 Locked</span>
                              )}
                            </div>

                            <p className={`font-bold text-sm leading-tight ${darkMode ? 'text-white' : 'text-gray-900'}`}>{loc.jobName}</p>
                            <p className={`text-xs mb-1 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>{loc.customerName}</p>

                            {loc.filename && (
                              <p className={`text-xs font-mono mt-1 px-1.5 py-0.5 rounded inline-block ${darkMode ? 'bg-gray-700 text-yellow-300' : 'bg-gray-100 text-gray-700'}`}>📄 {loc.filename}</p>
                            )}

                            {(loc.notes || loc.path) && (
                              <p className={`text-sm mt-1 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>{loc.notes || loc.path}</p>
                            )}

                            {loc.setBy && (
                              <p className={`text-xs mt-1.5 ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>
                                Set by {loc.setBy}{loc.setAt ? ` · ${new Date(loc.setAt).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'2-digit'})}` : ''}
                                {loc.stage ? ` · ${loc.stage}` : ''}
                              </p>
                            )}

                            {/* Change history */}
                            {loc.history && loc.history.length > 0 && (
                              <div className={`mt-2 pt-2 border-t ${darkMode ? 'border-gray-700' : 'border-gray-100'}`}>
                                <p className={`text-xs font-semibold mb-1.5 uppercase tracking-wide ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>📋 Change History</p>
                                <div className="space-y-1">
                                  {loc.history.map((h, hi) => (
                                    <div key={hi} className={`flex items-start gap-1.5 text-xs ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>
                                      <span className="mt-0.5 shrink-0">↩</span>
                                      <span>
                                        <span className="font-medium">{h.drive || '?'}</span>
                                        {h.path ? <span className={darkMode ? 'text-gray-600' : 'text-gray-300'}> · {h.path}</span> : ''}
                                        <span className={`mx-1 ${darkMode ? 'text-gray-600' : 'text-gray-300'}`}>—</span>
                                        {h.changedBy || h.setBy || '?'}
                                        {(h.changedAt || h.setAt) ? <span className={darkMode ? 'text-gray-600' : 'text-gray-300'}> · {new Date(h.changedAt || h.setAt).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'2-digit'})}</span> : ''}
                                      </span>
                                    </div>
                                  ))}
                                </div>
                              </div>
                            )}
                          </div>

                          {/* Override button (staff cannot lock) */}
                          {!loc.locked && (
                            <div className={`flex flex-col items-stretch border-l ${darkMode ? 'border-gray-700 bg-gray-800' : 'border-gray-100 bg-gray-50'}`}>
                              <button
                                onClick={() => setFileOverrideModal({ jobId: loc.jobId, locationIndex, drive: loc.drive || '', path: loc.path || '', notes: loc.notes || '' })}
                                className={`flex-1 px-3 text-xs font-medium transition-colors ${darkMode ? 'text-orange-400 hover:bg-gray-700' : 'text-orange-500 hover:bg-orange-50'}`}>
                                ✏️ Override
                              </button>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          );
        })()}
        {helpModalJSX}
      </div>
    );
  }

  // ADMIN VIEWS
  const overdueJobs = getOverdueJobs();
  const dueSoonJobs = getDueSoonJobs();
  const activeJobs = editingJobs.filter(job => !archivedJobIds.includes(job.id));
  const activeTimeEntries = timeEntries.filter(e => !e.clockOut);
  const newInquiries = inquiries.filter(i => i.status === 'new');


  const NavBar = () => {
    const isNavAdmin = currentUser?.role === 'admin' || currentUser?.role === 'manager';
    const adminTabs = [
      { key: 'dashboard',  label: 'Home' },
      { key: 'upcoming',   label: 'Upcoming' },
      { key: 'timeclock',  label: 'Clock' },
      { key: 'jobs',       label: 'Jobs' },
      { key: 'crm',        label: 'CRM' },
      { key: 'files',      label: 'Files' },
      { key: 'employees',  label: 'Staff' },
      { key: 'timesheets', label: 'Time' },
      { key: 'analytics',  label: 'Stats' },
      { key: 'quote',      label: 'Quote' },
      { key: 'revisions',  label: 'Revisions' },
      { key: 'wages',      label: 'Wages' },
      { key: 'feedback',   label: 'Feedback' },
    ];
    const employeeTabs = [
      { key: 'employee-dashboard', label: 'My Jobs' },
      { key: 'timeclock',          label: 'Clock' },
      { key: 'files',              label: 'Files' },
      { key: 'availability',       label: 'Avail.' },
      { key: 'wages',              label: 'Wages' },
      { key: 'feedback',           label: 'Feedback' },
    ];
    const tabs = isNavAdmin ? adminTabs : employeeTabs;
    const renderTabBtn = (tab) => (
      <button key={tab.key} onClick={() => setCurrentView(tab.key)}
        className={`py-1.5 px-1 rounded-lg text-center font-semibold transition-all ${currentView === tab.key ? 'nav-tab-active' : ''}`}
        style={{fontSize:'10px', ...(currentView !== tab.key ? {background:'rgba(255,255,255,0.05)', color:'rgba(255,255,255,0.5)'} : {})}}>
        {tab.label}
      </button>
    );
    return (
      <>
      <div className="sticky top-0 z-10 shadow-lg" style={{background: darkMode ? '#111827' : '#1a2535'}}>
        <div className="px-4 pt-3 pb-2">
          <div className="flex justify-between items-center mb-3">
            <div>
              <h1 className="font-bold text-lg leading-none" style={{color:'var(--gold)', fontFamily:'Cormorant Garamond, serif', letterSpacing:'1px'}}>Eyecon Moments</h1>
              <p className="text-xs" style={{color:'rgba(193,167,106,0.6)', letterSpacing:'2px', fontSize:'9px'}}>BUSINESS MANAGEMENT</p>
            </div>
            <div className="flex items-center gap-2">
              <button onClick={() => setHelpOpen(true)}
                className="w-8 h-8 flex items-center justify-center rounded-full text-sm font-bold"
                title="Help — ask anything"
                style={{background:'rgba(193,167,106,0.15)', color:'var(--gold)'}}>
                ?
              </button>
              <button onClick={() => setDarkMode(!darkMode)}
                className="w-8 h-8 flex items-center justify-center rounded-full text-sm"
                style={{background:'rgba(193,167,106,0.15)', color:'var(--gold)'}}>
                {darkMode ? '☀️' : '🌙'}
              </button>
              <button onClick={() => { setCurrentUser(null); setCurrentView('login'); }}
                className="px-3 py-1.5 rounded-lg text-xs font-medium"
                style={{background:'rgba(193,167,106,0.15)', color:'var(--gold)'}}>
                Logout
              </button>
            </div>
          </div>
          {isNavAdmin ? (
            <div className="space-y-1">
              <div className="grid grid-cols-7 gap-1">{adminTabs.slice(0, 7).map(renderTabBtn)}</div>
              <div className="grid grid-cols-6 gap-1">{adminTabs.slice(7).map(renderTabBtn)}</div>
            </div>
          ) : (
            <div className="grid grid-cols-6 gap-1">{tabs.map(renderTabBtn)}</div>
          )}
        </div>
      </div>
      </>
    );

    // ── Rundown modal data ────────────────────────────────────────────────────
    const rundownToday = new Date(); rundownToday.setHours(0,0,0,0);
    const rundownMonday = new Date(rundownToday);
    rundownMonday.setDate(rundownToday.getDate() - (rundownToday.getDay() === 0 ? 6 : rundownToday.getDay() - 1));
    const getEntryHours = (entry) => {
      if (entry.hoursWorked) return entry.hoursWorked;
      if (entry.clockOut) return (new Date(entry.clockOut) - new Date(entry.clockIn)) / 3600000;
      return (currentTime - new Date(entry.clockIn)) / 3600000;
    };
    const buildRundownStats = (entries) => {
      const byEmp = {};
      entries.forEach(e => {
        if (!byEmp[e.employeeId]) byEmp[e.employeeId] = { totalHours: 0, jobs: {} };
        const hrs = getEntryHours(e);
        byEmp[e.employeeId].totalHours += hrs;
        if (!byEmp[e.employeeId].jobs[e.jobId]) byEmp[e.employeeId].jobs[e.jobId] = { name: getJobName(e.jobId), hours: 0 };
        byEmp[e.employeeId].jobs[e.jobId].hours += hrs;
      });
      return byEmp;
    };
    const todayRundown = buildRundownStats(timeEntries.filter(e => { const d = new Date(e.clockIn); d.setHours(0,0,0,0); return d.getTime() === rundownToday.getTime(); }));
    const weekRundown  = buildRundownStats(timeEntries.filter(e => new Date(e.clockIn) >= rundownMonday));

                  <button key={tab} onClick={() => setRundownTab(tab)}
                    className={`flex-1 py-3 text-sm font-semibold transition-colors ${rundownTab === tab ? (darkMode ? 'text-blue-400 border-b-2 border-blue-400' : 'text-blue-600 border-b-2 border-blue-600') : (darkMode ? 'text-gray-400 hover:text-gray-300' : 'text-gray-500 hover:text-gray-700')}`}>
                    {label}
                  </button>
                ))}
              </div>
              <div className="overflow-y-auto flex-1 p-4 space-y-3">
                {Object.keys(activeStats).length === 0 ? (

                  Object.entries(activeStats)

                    .map(([empId, stats]) => {
                      const emp = employees.find(e => e.id === parseInt(empId));
                      if (!emp) return null;
                      const live = liveEntries.find(e => e.employeeId === parseInt(empId));
                      const jobs = Object.values(stats.jobs).sort((a,b) => b.hours - a.hours);
                      return (
                        <div key={empId} className={`p-4 rounded-xl ${darkMode ? 'bg-gray-700 border-gray-600' : 'bg-gray-50 border-gray-200'} border`}>
                          <div className="flex items-center justify-between mb-2">
                            <div className="flex items-center gap-2">
                              {live && <span className="w-2 h-2 rounded-full bg-green-400 animate-pulse inline-block"></span>}
                              <span className={`font-bold ${darkMode ? 'text-white' : 'text-gray-900'}`}>{emp.name}</span>
                              {live && <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-medium">LIVE</span>}
                            </div>

          {(() => {
            const _dashTodayMidnight = new Date(); _dashTodayMidnight.setHours(0, 0, 0, 0);
            const activeJobsList = editingJobs.filter(job => {
              if (archivedJobIds.includes(job.id)) return false;
              if (job.shootDate) { const sd = new Date(job.shootDate); sd.setHours(0,0,0,0); if (sd >= _dashTodayMidnight) return false; }
              return true;
            });
            
            // Photo completion
            const totalPhotoJobs = activeJobsList.filter(j => j.hasPhotos).length;
            const completedPhotoJobs = activeJobsList.filter(j => j.hasPhotos && j.photoStatus === 'completed').length;

                    ></div>
                  </div>
                  <p className="text-xs opacity-90 mt-2">{completedTasks} of {totalTasks} tasks completed</p>
                </div>

                {/* Photo & Video Breakdown */}
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <div className="flex justify-between items-center mb-1">
                      <span className="text-xs font-semibold text-gray-700">📸 Photos</span>
                      <span className="text-sm font-bold text-purple-600">{photoCompletionRate}%</span>
                    </div>
                    <div className="w-full bg-gray-200 rounded-full h-2">
                      <div className="bg-purple-500 h-2 rounded-full transition-all" style={{width: `${photoCompletionRate}%`}}></div>
                    </div>
                    <p className="text-xs text-gray-600 mt-1">{completedPhotoJobs}/{totalPhotoJobs} jobs</p>
                  </div>
                  <div>
                    <div className="flex justify-between items-center mb-1">
                      <span className="text-xs font-semibold text-gray-700">🎥 Video</span>
                      <span className="text-sm font-bold text-blue-600">{videoCompletionRate}%</span>
                    </div>
                    <div className="w-full bg-gray-200 rounded-full h-2">
                      <div className="bg-blue-500 h-2 rounded-full transition-all" style={{width: `${videoCompletionRate}%`}}></div>
                    </div>
                    <p className="text-xs text-gray-600 mt-1">{completedVideoStages}/{totalVideoStages} stages</p>
                  </div>
                </div>

                {/* Dropdown toggle */}
                <button
                  onClick={() => setProgressDetailOpen(o => !o)}
                  className="mt-3 w-full text-xs text-gray-500 hover:text-gray-700 flex items-center justify-center gap-1 py-1 border-t border-gray-100"
                >
                  {progressDetailOpen ? '▲ Hide breakdown' : '▼ Show job breakdown'}
                </button>

                {/* Job breakdown detail */}
                {progressDetailOpen && (() => {
                  const photoJobs = activeJobsList.filter(j => j.hasPhotos);
                  const videoJobs = activeJobsList.filter(j => j.hasVideo && j.stages);
                  return (
                    <div className="mt-2 space-y-4">
                      {/* Photos */}
                      {photoJobs.length > 0 && (
                        <div>
                          <p className="text-xs font-bold text-gray-700 mb-1">📸 Photos</p>
                          <div className="space-y-1">
                            {photoJobs.map(job => {
                              const done = job.photoStatus === 'completed';
                              return (
                                <div key={job.id} className="flex items-center justify-between text-xs py-1 px-2 rounded" style={{background: done ? '#f0fdf4' : '#fef9f0'}}>
                                  <span className="text-gray-800 truncate flex-1 mr-2">{job.jobName}</span>
                                  <span className={`font-semibold shrink-0 ${done ? 'text-green-600' : 'text-orange-500'}`}>{done ? '✅ Done' : '⏳ Pending'}</span>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      )}
                      {/* Video */}
                      {videoJobs.length > 0 && (
                        <div>
                          <p className="text-xs font-bold text-gray-700 mb-1">🎥 Video</p>
                          <div className="space-y-1">
                            {videoJobs.map(job => {
                              const total = job.stages.length;
                              const done = job.stages.filter(s => s.status === 'completed').length;
                              const allDone = done === total;
                              return (
                                <div key={job.id} className="flex items-center justify-between text-xs py-1 px-2 rounded" style={{background: allDone ? '#f0fdf4' : '#fef9f0'}}>
                                  <span className="text-gray-800 truncate flex-1 mr-2">{job.jobName}</span>
                                  <span className={`font-semibold shrink-0 ${allDone ? 'text-green-600' : 'text-orange-500'}`}>{allDone ? '✅ Done' : `⏳ ${done}/${total}`}</span>
                                </div>
                              );

                          </div>
                        </div>
                      )}

                })()}

          {/* From the Team — notes only (threads go into loose threads directly) */}
          {(() => {
            const myItems = sharedItems.filter(i => i.sharedWith && i.sharedWith.some(id => String(id) === String(currentUser?.id)) && !i.done && i.type === 'note');
            if (myItems.length === 0) return null;
            return (
              <div className={`${darkMode ? 'bg-gray-800 border border-blue-700' : 'bg-blue-50 border border-blue-200'} rounded-lg shadow p-4`}>
                <div className="flex justify-between items-center mb-3">
                  <h3 className={`font-bold ${darkMode ? 'text-blue-300' : 'text-blue-800'}`}>📬 Notes from the Team</h3>
                  <span className={`text-xs px-2 py-1 rounded font-medium ${darkMode ? 'bg-blue-900 text-blue-300' : 'bg-blue-100 text-blue-700'}`}>{myItems.length} new</span>
                </div>
                <div className="space-y-2">
                  {myItems.map(item => (
                    <div key={item.id} className={`p-3 rounded-lg ${darkMode ? 'bg-gray-700' : 'bg-white border border-blue-100'}`}>
                      <div className="flex items-start justify-between gap-2">
                        <div className="flex-1">
                          <div className="flex items-center gap-1.5 mb-1">
                            <span className={`text-xs font-semibold ${darkMode ? 'text-blue-300' : 'text-blue-600'}`}>{item.sharedByName}</span>
                            <span className={`text-xs px-1.5 py-0.5 rounded ${item.type === 'note' ? (darkMode ? 'bg-purple-900 text-purple-300' : 'bg-purple-100 text-purple-600') : (darkMode ? 'bg-orange-900 text-orange-300' : 'bg-orange-100 text-orange-600')}`}>
                              {item.type === 'note' ? '🗒️ note' : '📌 thread'}
                            </span>

                        </div>
                        <button
                          onClick={() => markSharedItemDone(item.id)}
                          className="shrink-0 px-2 py-1 bg-green-500 text-white rounded text-xs font-semibold hover:bg-green-600"
                        >✓ Done</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}

          {/* My Itineraries — shows assigned + shared */}
          {(() => {
            const assignedIds = new Set(getUserAssignedJobs(currentUser.id).map(j => j.id));
            const itinHasEnded = (j) => {
              if (!j.shootDate) return false;
              const end = new Date(j.shootDate);
              const [eh, em] = (j.itinerary?.endTime || '23:59').split(':').map(Number);
              end.setHours(eh, em, 0, 0);
              return end < new Date();
            };
            const myItineraryJobs = editingJobs.filter(j => {
              if (archivedJobIds.includes(j.id) || !j.itinerary) return false;
              if (itinHasEnded(j)) return false;
              const isAssigned = assignedIds.has(j.id);
              const myId = String(currentUser.id);
              const isSharedWithMe = j.itinerary?.sharedWith?.some(id => String(id) === myId);
              if (!isAssigned && !isSharedWithMe) return false;
              // Assigned jobs: require scheduleItems or slots; shared jobs: always show
              if (isSharedWithMe) return true;
              return j.itinerary.scheduleItems?.length > 0 || j.itinerary.slots;
            }).sort((a, b) => new Date(a.shootDate) - new Date(b.shootDate));
            if (myItineraryJobs.length === 0) return null;
            return (
              <div className="space-y-3">
                <div className={`flex items-center justify-between px-3 py-2 rounded-lg cursor-pointer ${darkMode ? 'bg-gray-800 hover:bg-gray-700' : 'bg-white hover:bg-gray-50'} shadow`}
                  onClick={() => setMyItinerariesOpen(o => !o)}>
                  <h3 className={`font-bold text-sm ${darkMode ? 'text-white' : 'text-gray-800'}`}>📋 My Itineraries ({myItineraryJobs.length})</h3>
                  <span className={`text-xs ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>{myItinerariesOpen ? '▲' : '▼'}</span>
                </div>
                {myItinerariesOpen && myItineraryJobs.map(job => {
                  const itin = job.itinerary;
                  const scheduleItems = itin.scheduleItems || [];
                  const isShared = !assignedIds.has(job.id) && itin?.sharedWith?.includes(currentUser.id);
                  const isLive = liveItineraryJob === job.id;
                  const now = new Date();
                  const nowMins = now.getHours() * 60 + now.getMinutes();
                  const toMins = (t) => { if (!t) return 0; const [h,m] = t.split(':').map(Number); return h*60+(m||0); };
                  // Build times from start + cumulative durations — duration units are × 15 min
                  const startMins = toMins(itin.startTime || '10:00');
                  let cumulativeMins = startMins;
                  const itemsWithTime = [];
                  let _si = 0;
                  while (_si < scheduleItems.length) {
                    const _item = scheduleItems[_si];
                    const _gid = _item.groupId;
                    if (_gid) {
                      const _group = [];
                      let _gj = _si;
                      while (_gj < scheduleItems.length && scheduleItems[_gj].groupId === _gid) { _group.push(scheduleItems[_gj]); _gj++; }
                      const _gMins = cumulativeMins;
                      const _maxDur = Math.max(..._group.map(g => g.duration || 2));
                      const _hh = Math.floor(_gMins / 60) % 24, _mm = _gMins % 60;
                      const _ct = `${String(_hh).padStart(2,'0')}:${String(_mm).padStart(2,'0')}`;
                      _group.forEach(g => itemsWithTime.push({ ...g, computedTime: _ct, computedMins: _gMins }));
                      cumulativeMins += _maxDur * 15;
                      _si = _gj;
                    } else {
                      const itemTime = _item.time ? toMins(_item.time) : cumulativeMins;
                      if (!_item.time) cumulativeMins += (_item.duration || 2) * 15;
                      else cumulativeMins = itemTime + (_item.duration || 2) * 15;
                      const hh = Math.floor(itemTime / 60) % 24, mm = itemTime % 60;
                      itemsWithTime.push({ ..._item, computedTime: `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`, computedMins: itemTime });
                      _si++;
                    }
                  }
                  // Find current item by time (skip duplicate computedMins from concurrent groups)
                  let currentIdx = -1;
                  for (let i = 0; i < itemsWithTime.length; i++) {
                    const itemMins = itemsWithTime[i].computedMins;
                    // Find next item that starts at a different time (skips concurrent siblings)
                    let ni = i + 1;
                    while (ni < itemsWithTime.length && itemsWithTime[ni].computedMins === itemMins) ni++;
                    const nextMins = ni < itemsWithTime.length ? itemsWithTime[ni].computedMins : 24*60;
                    if (nowMins >= itemMins && nowMins < nextMins) { currentIdx = i; break; }
                  }
                  const currentGroupId = currentIdx >= 0 ? itemsWithTime[currentIdx]?.groupId : null;
                  return (
                    <div key={job.id} className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-lg shadow`}>
                      <div className="flex justify-between items-center p-4">
                        <div>
                          <h3 className={`font-bold ${darkMode ? 'text-white' : ''}`}>📋 {job.jobName}</h3>
                          <div className="flex items-center gap-2 mt-0.5">
                            <p className={`text-xs ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>{new Date(job.shootDate).toLocaleDateString('en-GB', {weekday:'short',day:'numeric',month:'short'})}</p>
                            {isShared && <span className="text-xs px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 font-medium">Shared with you</span>}
                          </div>
                        </div>
                        <button onClick={() => setLiveItineraryJob(isLive ? null : job.id)}
                          className={`px-3 py-1.5 rounded-lg text-xs font-bold ${isLive ? 'bg-red-500 text-white animate-pulse' : 'text-white'}`}
                          style={isLive ? {} : {background:'var(--gold)'}}>
                          {isLive ? '🔴 LIVE' : '▶ Go Live'}
                        </button>
                      </div>

                      {isLive ? (
                        // LIVE VIEW — current item large, surrounding items contextual
                        <div className="px-4 pb-4 space-y-2">
                          {/* Header: start→end times */}
                          <div className={`flex justify-between text-xs px-1 pb-1 border-b ${darkMode ? 'border-gray-700 text-gray-400' : 'border-gray-200 text-gray-500'}`}>
                            <span>⏱ {itin.startTime || '?'} → {itin.endTime || '?'}</span>
                            <span>{itemsWithTime.length} items</span>
                          </div>
                          {currentIdx === -1 && (
                            <div className={`text-center py-6 rounded-xl ${darkMode ? 'bg-gray-700' : 'bg-gray-50'}`}>
                              <p className={`text-2xl font-bold ${darkMode ? 'text-white' : ''}`}>⏳ Not started yet</p>
                              <p className={`text-sm mt-1 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>First item: {itemsWithTime[0]?.computedTime} — {itemsWithTime[0]?.name}</p>
                            </div>
                          )}
                          {(() => {
                            // Group-aware boundaries: concurrent items share computedMins
                            const _curMins = currentIdx >= 0 ? itemsWithTime[currentIdx].computedMins : -1;
                            const _nextMins = itemsWithTime.find(it => it.computedMins > _curMins)?.computedMins ?? Infinity;
                            const _afterNextMins = itemsWithTime.find(it => it.computedMins > _nextMins)?.computedMins ?? Infinity;
                            return (<>
                          {itemsWithTime.map((item, idx) => {
                            const isCurrent = _curMins >= 0 && item.computedMins === _curMins;
                            const isPast = !isCurrent && _curMins >= 0 && item.computedMins < _curMins;
                            const isNext = !isCurrent && !isPast && item.computedMins === _nextMins;
                            if (!isCurrent && !isNext && !isPast) return null;
                            return (
                              <div key={idx} className={`rounded-xl transition-all ${
                                isCurrent ? 'p-4 border-2' : isPast ? 'p-2 opacity-40' : 'p-3 border'
                              } ${darkMode ? (isCurrent ? 'bg-gray-700' : 'bg-gray-700') : (isCurrent ? 'bg-yellow-50' : 'bg-gray-50')}`}
                                style={isCurrent ? {borderColor: item.color || 'var(--gold)'} : {}}>
                                <div className="flex items-center gap-3">
                                  <div className="w-3 h-3 rounded-full flex-shrink-0" style={{background: item.color || '#888'}}></div>
                                  <div className="flex-1">
                                    <p className={`font-bold ${isCurrent ? 'text-xl' : 'text-sm'} ${darkMode ? 'text-white' : ''}`}>{item.name || item.label || 'Item'}</p>
                                    <p className={`${isCurrent ? 'text-sm' : 'text-xs'} ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>
                                      {item.computedTime}{isCurrent ? ' — NOW' : isNext ? ' — up next' : ' — done'}
                                      {isCurrent && item.duration ? ` · ${item.duration * 15}min` : ''}
                                    </p>
                                  </div>
                                  {isCurrent && <span className="text-2xl">▶️</span>}
                                  {isPast && <span className="text-lg">✅</span>}
                                </div>
                              </div>
                            );
                          })}
                          {/* Coming up list — everything after the next group */}
                          {_afterNextMins < Infinity && (
                            <div className={`rounded-lg p-2 ${darkMode ? 'bg-gray-700' : 'bg-gray-50'}`}>
                              <p className={`text-xs font-semibold mb-1 ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>Coming up:</p>
                              {itemsWithTime.filter(it => it.computedMins >= _afterNextMins).map((item, i) => (
                                <div key={i} className="flex items-center gap-2 py-0.5">
                                  <div className="w-2 h-2 rounded-full flex-shrink-0" style={{background: item.color || '#888'}}></div>
                                  <p className={`text-xs ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>{item.computedTime} — {item.name || item.label || 'Item'}</p>
                                </div>
                              ))}
                            </div>
                          )}
                            </>);
                          })()}
                        </div>
                      ) : (
                        // Compact list view
                        <div className={`px-4 pb-3 divide-y ${darkMode ? 'divide-gray-700' : 'divide-gray-100'}`}>
                          <p className={`text-xs py-1.5 ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>{itin.startTime || '?'} → {itin.endTime || '?'} · {itemsWithTime.length} items</p>
                          {itemsWithTime.length === 0 ? (
                            <div className={`py-4 text-center ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>
                              <p className="text-2xl mb-1">✏️</p>
                              <p className="text-xs">Itinerary is being prepared</p>
                            </div>
                          ) : itemsWithTime.map((item, idx) => (
                            <div key={idx} className="flex items-center gap-3 py-1.5">
                              <div className="w-2 h-2 rounded-full flex-shrink-0" style={{background: item.color || '#888'}}></div>
                              <span className={`text-xs w-12 flex-shrink-0 font-mono ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>{item.computedTime}</span>
                              <span className={`text-sm ${darkMode ? 'text-gray-200' : 'text-gray-700'}`}>{item.name || item.label || 'Item'}</span>
                              {item.duration && <span className={`ml-auto text-xs ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>{item.duration * 15}m</span>}
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            );
          })()}

          {/* Loose Threads */}

        if (job.calendarEndTime) endTime = job.calendarEndTime;
        return { startTime, endTime, scheduleItems: [], customItems: [], notes: '', nextOfKin: { name: '', phone: '' } };
      }
      // Convert old slots format to scheduleItems if needed
      let scheduleItems = job.itinerary.scheduleItems || [];
      if (scheduleItems.length === 0 && job.itinerary.slots) {
        const sortedSlots = Object.entries(job.itinerary.slots)
          .filter(([_, items]) => items && items.length > 0)
          .sort((a, b) => {
            const [ah, am] = a[0].split(':').map(Number);
            const [bh, bm] = b[0].split(':').map(Number);
            return (ah * 60 + am) - (bh * 60 + bm);
          });
        sortedSlots.forEach(([_, items]) => {
          items.forEach(item => scheduleItems.push(item));
        });
      }
      return { 
        startTime: job.itinerary.startTime || '10:00', 
        endTime: job.itinerary.endTime || '22:00', 
        scheduleItems,
        customItems: job.itinerary.customItems || [],

              const hasIncompleteVideo = myVideoStages.some(s => s.status !== 'completed');

            const _pad2 = n => String(n).padStart(2,'0');
            const _fmtDT = d => `${d.getFullYear()}-${_pad2(d.getMonth()+1)}-${_pad2(d.getDate())}T${_pad2(d.getHours())}:${_pad2(d.getMinutes())}`;

            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
            const pad2 = n => String(n).padStart(2,'0');
            const fmtDT = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}T${pad2(d.getHours())}:${pad2(d.getMinutes())}`;

                                </div>
                                <span className={`font-semibold text-sm ${darkMode ? 'text-white' : 'text-gray-800'}`}>{emp.name}</span>

                              </div>
                              <span className={`text-xs font-medium ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>{empTotal.toFixed(1)}h</span>
                            </div>

                            {empEntries.map(entry => {
                              const isActive = !entry.clockOut;

                                      {new Date(entry.clockIn).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}
                                    </span>

                                  {/* Job name */}
                                  <span className={`flex-1 truncate ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>{entry.jobId ? getJobName(entry.jobId) : <span className="italic">{entry.description || 'General Work'}</span>}</span>
                                  {/* Clock In */}
                                  <span className={`shrink-0 w-11 text-center tabular-nums ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>{formatTime(entry.clockIn)}</span>

                                  <span className={`shrink-0 w-12 text-right font-semibold tabular-nums ${darkMode ? 'text-blue-400' : 'text-blue-600'}`}>{hrs}</span>
                                  {/* Progress */}
                                  {!isActive && entry.progressPercent !== null && (

  }

  // JOBS
  if (currentView === 'jobs') {
    const _todayForJobsFilter = new Date(); _todayForJobsFilter.setHours(0, 0, 0, 0);
    const filteredJobs = editingJobs.filter(job => {
      if (!showArchived && archivedJobIds.includes(job.id)) return false;
      // Exclude jobs whose shoot date is today or in the future (still in "upcoming")
      if (job.shootDate) {
        const shootDate = new Date(job.shootDate); shootDate.setHours(0, 0, 0, 0);
        if (shootDate >= _todayForJobsFilter) return false;
      }
      if (jobSearchQuery) {
        const query = jobSearchQuery.toLowerCase();
        return job.jobName.toLowerCase().includes(query) || job.customerName.toLowerCase().includes(query);
      }
      return true;
    });

    // Jobs needing assignment (unassigned file locations or stages)
    const jobsNeedingAssignment = editingJobs.filter(job => {
      if (archivedJobIds.includes(job.id)) return false;
      // Only show jobs whose shoot date has passed (day after shoot)
      if (job.shootDate) {
        const dayAfterShoot = new Date(job.shootDate);
        dayAfterShoot.setDate(dayAfterShoot.getDate() + 1);
        dayAfterShoot.setHours(0, 0, 0, 0);
        if (new Date() < dayAfterShoot) return false;
      }
      const hasUnassignedPhoto = job.hasPhotos && job.photoAssignedTo === 0 && job.photoStatus !== 'completed';
      // Only check if CURRENT video stage (first incomplete one) is unassigned
      let hasUnassignedCurrentVideoStage = false;
      if (job.hasVideo) {
        for (let i = 0; i < job.stages.length; i++) {
          if (job.stages[i].status !== 'completed') {
            // This is the current stage - check if it's unassigned
            hasUnassignedCurrentVideoStage = job.stages[i].assignedTo === 0;
            break;
          }
        }
      }
      const hasNoFileLocation = !job.fileLocations || job.fileLocations.length === 0;
      return hasUnassignedPhoto || hasUnassignedCurrentVideoStage || hasNoFileLocation;
    });

    // Pipeline stages for Kanban
    const pipelineStages = [
      { name: 'Cutting, Syncing & Organising', key: 0 },
      { name: 'Music, Nesting & Sorting', key: 1 },
      { name: 'Colouring & Checking', key: 2 },
      { name: 'Highlights Trailer & Intro', key: 3 },
      { name: 'Completed', key: 4 }
    ];

    // Get current stage for a job
    const getJobCurrentStage = (job) => {
      if (!job.hasVideo) return -1;
      for (let i = 0; i < job.stages.length; i++) {
        if (job.stages[i].status !== 'completed') return i;
      }
      return 4; // All completed
    };

    // Move job to next stage
    const moveJobToNextStage = (job) => {
      const currentStage = getJobCurrentStage(job);
      if (currentStage < 4 && currentStage >= 0) {
        updateJobStageStatus(job.id, job.stages[currentStage].id, 'completed');
        // Email notification would go here
        const notification = {
          type: 'stage_complete',
          jobName: job.jobName,
          stageName: job.stages[currentStage].name,
          completedBy: job.stages[currentStage].assignedTo ? getEmployeeName(job.stages[currentStage].assignedTo) : 'Unknown',
          timestamp: new Date()
        };
        setEmailNotifications(prev => [...prev, notification]);
      }
    };

    // Move job to previous stage
    const moveJobToPrevStage = (job) => {
      const currentStage = getJobCurrentStage(job);
      if (currentStage > 0 && currentStage <= 4) {
        const prevIdx = currentStage === 4 ? 3 : currentStage - 1;
        updateJobStageStatus(job.id, job.stages[prevIdx].id, 'in-progress');
      }
    };

            <button onClick={() => setShowArchived(!showArchived)} className={`px-4 py-2 rounded-lg text-sm whitespace-nowrap ${darkMode ? 'bg-gray-700 text-white' : 'bg-gray-100'}`}>

            </button>
          </div>

            <h3 className={`font-bold mb-3 ${darkMode ? 'text-white' : 'text-gray-800'}`}>🚦 Team Capacity</h3>
            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
              {employees.filter(e => e.canBeAssigned).map(emp => {
                const workload = getEmployeeWorkload(emp.id);
                const loadColor = workload.dueThisWeek >= 3 ? 'bg-red-500' : 
                                  workload.dueThisWeek >= 2 ? 'bg-yellow-500' : 
                                  workload.total === 0 ? 'bg-green-500' : 'bg-blue-500';
                const loadText = workload.dueThisWeek >= 3 ? 'Overloaded' : 
                                 workload.dueThisWeek >= 2 ? 'Busy' : 
                                 workload.total === 0 ? 'Available' : 'Normal';
                const isExpanded = expandedCapacityEmp === emp.id;

                      return (

          </div>

          {/* Staff Availability Calendar */}
          {(() => {
            const today = new Date();
            const calMonth = availCalMonth;
            const calYear = availCalYear;
            const firstDay = new Date(calYear, calMonth, 1).getDay();
            const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

            const getOffStaffForDay = (day) => {

            return (

                  <button onClick={() => { if (calMonth === 11) { setAvailCalMonth(0); setAvailCalYear(y => y+1); } else setAvailCalMonth(m => m+1); }}

                </div>
                <div className="grid grid-cols-7 gap-1 mb-1">
                  {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d => (

                <div className="grid grid-cols-7 gap-1">
                  {Array.from({length: firstDay}).map((_, i) => <div key={`e${i}`} />)}
                  {Array.from({length: daysInMonth}).map((_, i) => {
                    const day = i + 1;

                    return (
                      <div key={day} className={`rounded p-1 min-h-[36px] ${isToday ? 'ring-2 ring-yellow-400' : ''} ${darkMode ? 'bg-gray-700' : 'bg-gray-50'}`}>

                        {offStaff.map((name, ni) => (
                          <div key={ni} className={`text-white text-xs rounded px-0.5 mt-0.5 truncate ${empColorMap[name] || 'bg-gray-500'}`} style={{fontSize:'9px'}}>{name.split(' ')[0]}</div>

                {/* Pending requests — admin approves/declines */}
                {currentUser?.role === 'admin' && pendingRequests.length > 0 && (

                          </div>

                      ))}

                )}

                {/* My requests — staff view */}
                {currentUser?.role !== 'admin' && (
                  <div className={`mt-4 pt-4 border-t ${darkMode ? 'border-gray-700' : 'border-gray-200'}`}>
                    <p className={`text-sm font-semibold mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>My Requests</p>
                    {availabilityRequests.filter(r => r.employeeId === currentUser.id).length === 0
                      ? <p className={`text-xs ${darkMode ? 'text-gray-500' : 'text-gray-400'}`}>No requests yet</p>
                      : availabilityRequests.filter(r => r.employeeId === currentUser.id).map(req => (
                        <div key={req.id} className={`flex items-center justify-between p-2 rounded-lg mb-1 ${darkMode ? 'bg-gray-700' : 'bg-gray-50'}`}>
                          <div>
                            <p className={`text-xs font-medium ${darkMode ? 'text-white' : ''}`}>{req.startDate}{req.endDate !== req.startDate ? ` → ${req.endDate}` : ''}</p>
                            {req.reason && <p className={`text-xs ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>{req.reason}</p>}
                          </div>
                          <span className={`text-xs px-2 py-0.5 rounded-full font-semibold ${req.status === 'approved' ? 'bg-green-500 text-white' : req.status === 'declined' ? 'bg-red-500 text-white' : 'bg-yellow-400 text-yellow-900'}`}>
                            {req.status}

                        </div>

                    }

                )}
              </div>
            );
          })()}

          {/* Request Day Off Modal */}
          {showAvailabilityModal && (
            <div className="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4">
              <div className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-xl shadow-xl w-full max-w-sm`}>

                      className={`w-full px-3 py-2 border rounded-lg ${darkMode ? 'bg-gray-700 border-gray-600 text-white' : ''}`} />

                      className={`w-full px-3 py-2 border rounded-lg ${darkMode ? 'bg-gray-700 border-gray-600 text-white' : ''}`} />

                  <div>
                    <label className={`block text-sm font-medium mb-1 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>Reason (optional)</label>
                    <input type="text" placeholder="e.g. Holiday, appointment..." value={availForm.reason}
                      onChange={e => setAvailForm(p => ({...p, reason: e.target.value}))}
                      className={`w-full px-3 py-2 border rounded-lg ${darkMode ? 'bg-gray-700 border-gray-600 text-white' : ''}`} />
