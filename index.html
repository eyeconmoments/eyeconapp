    <title>Eyecon Moments</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });

<body>
    <div id="root">
      <div id="em-splash" style="position:fixed;inset:0;background:#1a2535;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:Montserrat,sans-serif;padding:32px;box-sizing:border-box;">
        <img src="/logo.png" style="width:110px;height:110px;object-fit:contain;margin-bottom:24px;border-radius:50%;" alt="Eyecon Moments" />
        <div style="color:#C1A76A;font-size:11px;letter-spacing:4px;margin-bottom:28px;text-transform:uppercase">Eyecon Moments</div>
        <div style="color:#8a9bb0;font-size:13px;margin-bottom:6px;letter-spacing:1px">Please wait — loading your workspace</div>
        <div style="margin:18px 0 24px;width:180px;height:2px;border-radius:2px;background:#2d3f55;overflow:hidden"><div id="em-bar" style="height:100%;background:linear-gradient(90deg,#C1A76A,#e8d4a0);border-radius:2px"></div></div>
        <div style="max-width:300px;text-align:center;padding:16px 20px;border:1px solid rgba(193,167,106,0.2);border-radius:12px;background:rgba(193,167,106,0.05)">
          <div style="color:#C1A76A;font-size:10px;letter-spacing:2px;margin-bottom:8px;text-transform:uppercase">&#x1F4A1; Tip of the Day</div>
          <div id="em-tip" style="color:#c8d6e5;font-size:12px;line-height:1.7;font-style:italic"></div>
        </div>
      </div>
      <style>@keyframes em-bar{0%{width:0%;margin-left:0}50%{width:100%;margin-left:0}100%{width:0%;margin-left:100%}}#em-bar{animation:em-bar 1.6s ease-in-out infinite}</style>
      <script>
        (function(){var t=["The golden hour — just after sunrise and before sunset — gives your images a warm, flattering glow that's almost impossible to replicate artificially.","Always shoot in RAW format if possible. It retains far more detail than JPEG, giving you greater flexibility in post-production.","For weddings, scout the venue beforehand. Knowing the light, backgrounds and key moments lets you be invisible on the day.","A prime lens (50mm or 85mm) is often better than a zoom for portraits — sharper, faster aperture, and it makes you move and think.","The best camera is the one you have with you. Technique and timing will always matter more than equipment.","For video, stabilisation is everything. A shaky shot breaks the cinematic feel instantly — invest in a gimbal or brace properly.","Interview subjects at eye level. Eye level feels honest; shooting down feels authoritative; shooting up feels vulnerable.","Natural light through a window is one of the most beautiful sources available — large, soft, diffused, and completely free.","When photographing people, focus on the eyes. If the eyes are sharp, the image reads as sharp even if other elements are soft.","The 180° shutter rule: set shutter speed to double your frame rate (e.g. 1/50 at 25fps) for natural-looking motion blur in video.","Negative space — leaving empty areas around your subject — draws attention powerfully and gives the image room to breathe.","Shoot more than you think you need. You can always delete; you can never recreate a moment you missed.","Colour grade last. Get exposure and white balance right in camera — grading shapes mood, it doesn't fix mistakes.","Framing within a frame — doorways, arches, windows — adds depth and draws the viewer's eye naturally to the subject.","For large events, always have a backup body and at least one spare battery. Reliability is professionalism."];document.getElementById("em-tip").textContent=t[Math.floor(Math.random()*t.length)];})();
      </script>
    </div>
    <script src="https://apis.google.com/js/api.js" defer></script>
    <script src="https://accounts.google.com/gsi/client" defer></script>

</body>
