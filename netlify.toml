[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL"

[functions]
  node_bundler = "esbuild"

[functions."scheduled-backup"]
  schedule = "0 3 * * *"

[functions."daily-reminders"]
  schedule = "0 8 * * *"

[[redirects]]
  from = "/client/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
